#
# This file creates a filebeat prospector for source data from the KAPE forensic tool suite

- type: filestream
  id: kape-mftecmd-json
  paths:
    - /logstash/kape/**/*_MFTECmd*_Output.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_filesystem
  tags: [ 'json' ]

- type: filestream
  id: kape-lecmd-json
  paths:
    - /logstash/kape/**/*_LECmd_Output.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_lnkfiles
  tags: [ 'json' ]

- type: filestream
  id: kape-evtxecmd-json
  paths:
    - /logstash/kape/**/*_EvtxECmd_Output.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_evtxlogs
  tags: [ 'json' ]

- type: filestream
  id: kape-sbecmd-json
  paths:
    # SBECmd --json output. Filenames follow KAPE convention:
    #   <hostname>_<user>_<UsrClass|NTUSER>.json
    # or, when SBECmd runs against a directory:
    #   <hostname>_SBECmd_Output.json
    - /logstash/kape/**/*_SBECmd_*.json
    - /logstash/kape/**/*_UsrClass.json
    - /logstash/kape/**/*_NTUSER.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_shellbags
  tags: [ 'json' ]

- type: filestream
  id: kape-pecmd-json
  paths:
    # PECmd --json output, or csv2json.py applied to a PECmd --csv file.
    # KAPE naming convention: <YYYYMMDDHHMMSS>_PECmd_Output.json
    - /logstash/kape/**/*_PECmd_Output.json
    - /logstash/kape/**/*_PECmd_*.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_prefetch
  tags: [ 'json' ]

- type: filestream
  id: kape-recmd-json
  paths:
    # RECmd batch output (Kroll_Batch, DFIRBatch, etc.) converted via csv2json.py.
    # KAPE naming convention: <YYYYMMDDHHMMSS>_RECmd_Batch_<BatchName>_Output.json
    - /logstash/kape/**/*_RECmd_Batch_*_Output.json
    - /logstash/kape/**/*_RECmd_*.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_registry
  tags: [ 'json' ]

- type: filestream
  id: browser-hindsight-json
  paths:
    # Hindsight browser-history output. Either:
    #   (a) Hindsight's native --format=jsonl output (one JSON per line), or
    #   (b) xlsx Timeline sheet converted via supporting-scripts/hindsight2json.py
    # Filename convention is flexible; we match any *hindsight* file plus the
    # explicit naming pattern from Hindsight defaults.
    - /logstash/kape/**/*hindsight*.json
    - /logstash/kape/**/*hindsight*.jsonl
    - /logstash/kape/**/Hindsight_*.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: browser_history
  tags: [ 'json' ]

- type: filestream
  id: browser-nirsoft-json
  paths:
    # NirSoft BrowsingHistoryView output (csv2json'd to JSONL).
    # BrowsingHistoryView native CSV is cp1252-encoded; pipe through
    # csv2json.py before dropping into /logstash/kape/. Match the typical
    # filename pattern (BrowsingHistory.json, *_nirsoft_*.json, etc.).
    - /logstash/kape/**/BrowsingHistory*.json
    - /logstash/kape/**/*nirsoft*BrowsingHistory*.json
    - /logstash/kape/**/*BrowsingHistoryView*.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: browser_nirsoft
  tags: [ 'json' ]

- type: filestream
  id: kape-jlecmd-json
  paths:
    # JLECmd output covers both jump-list variants. KAPE's JLECmd module
    # produces files matching <YYYYMMDDHHMMSS>_AutomaticDestinations.csv
    # and <YYYYMMDDHHMMSS>_CustomDestinations.csv. csv2json those to .json
    # before dropping into /logstash/kape/.
    - /logstash/kape/**/*AutomaticDestinations*.json
    - /logstash/kape/**/*CustomDestinations*.json
    - /logstash/kape/**/*JLECmd*.json
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_jumplists
  tags: [ 'json' ]

- type: filestream
  id: volatility-pstree-json
  paths:
    # Volatility 3 windows.pstree.PsTree output. Pre-process with
    # supporting-scripts/vol2json.py first:
    #   vol2json.py -r vol_out.json -w pstree.jsonl
    # vol2json.py auto-detects encoding (UTF-8 / UTF-8-BOM / UTF-16 LE/BE,
    # the last of which is what PowerShell `>` redirection produces by
    # default — and what would otherwise silently fail JSON parse here),
    # strips BOMs, and emits one root process tree per line.
    - /logstash/kape/**/*pstree*.json
    - /logstash/kape/**/*pstree*.jsonl
    - /logstash/kape/**/*PsTree*.json
    - /logstash/kape/**/*PsTree*.jsonl
    - /logstash/kape/**/*volatility*pstree*.json
    - /logstash/kape/**/*volatility*pstree*.jsonl
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: volatility_pstree
  tags: [ 'json' ]

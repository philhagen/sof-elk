# (C)2026 Lewes Technology Consulting, LLC
#
# This file creates a filebeat prospector for source data from the KAPE forensic tool suite

- type: filestream
  id: kape-mftecmd-json
  paths:
    - /logstash/kape/**/*_MFTECmd*_Output.json
    - /logstash/kape/**/*_MFTECmd*_Output.json.gz
  compression: auto
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_filesystem
  tags: [ 'json' ]

- type: filestream
  id: kape-lecmd-json
  paths:
    - /logstash/kape/**/*_LECmd_Output.json
    - /logstash/kape/**/*_LECmd_Output.json.gz
  compression: auto
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_lnkfiles
  tags: [ 'json' ]

- type: filestream
  id: kape-evtxecmd-json
  paths:
    - /logstash/kape/**/*_EvtxECmd_Output.json
    - /logstash/kape/**/*_EvtxECmd_Output.json.gz
  compression: auto
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_evtxlogs
  tags: [ 'json' ]

- type: filestream
  id: kape-pecmd-json
  paths:
    - /logstash/kape/**/*_PECmd_Output.json
    - /logstash/kape/**/*_PECmd_Output.json.gz
  compression: auto
  # the _PECmd_Output_Timeline.json file is intentionally excluded - it is a
  # flattened-per-run-time view of the same data already captured here
  prospector.scanner.exclude_files: [ '_PECmd_Output_Timeline\.json$', '_PECmd_Output_Timeline\.json$.gz' ]
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: kape_prefetch
  tags: [ 'json' ]

#
# This file contains inputs for monitoring Volatility3 memory forensics output

- type: filestream
  id: volatility-01
  paths:
    - /logstash/volatility/**/*.json
  # not needed since file path/extension is defined above
  # prospector.scanner.exclude_files: [ 'readme.txt', '\.gz$', '\.bz2$', '\.zip$', '\.bak$', '\.old$' ]
  close.on_state_change.inactive: 5m
  clean_removed: true
  parsers:
    - multiline:
        type: pattern
        pattern: "^(?:  {|])"
        negate: true
        match: after
  # exclude_lines takes place AFTER the multiline processing
  # this line will drop the start/end of the array
  exclude_lines: [ "^\\[$", "^\\]$" ]
  processors:
    - add_labels:
        labels:
          type: volatility
  tags: [ 'json' ]

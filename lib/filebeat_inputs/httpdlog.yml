#
# This file creates a filebeat prospector for httpd access log source data from the SOF-ELK® VM itself

- type: filestream
  id: httpd-01
  paths:
    - /logstash/httpd/**
  compression: auto
  prospector.scanner.exclude_files: [ '\.bz2$', '\.zip$' ]
  close.on_state_change.inactive: 5m
  clean_removed: true
  processors:
    - add_labels:
       labels:
         type: httpdlog

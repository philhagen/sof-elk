# This file contains postprocessing for all items

filter {

  # de-duplicate the [tags] array
  # TODO: deduplicating an array is a candidate for an external script (also done with related.*)
  ruby {
    code => "
      a = event.get('[tags]')
      if a.is_a? Array
        event.remove('[tags]')
        event.set('tags', a.uniq)
      end"
  }

  ruby {
    code => "event.set('sof-elk.processing_time', (Time.now.to_f - event.get('[@metadata][ingest_start]')).round(8))"
  }

#  if [source] =~ ^/logstash/ {
#    mutate {
#      gsub => {
#        "source", "^/logstash/\w/", ""
#      }
#    }
#  }
}

# Logstash postprocessing configuration for Volatility records

filter {
  # Only process if this is a volatility document
  if [labels][type] == "volatility" {
    mutate {
      remove_field => "raw"
    }

    # Handle null command lines
    if [process][command_line] == "null" {
      mutate {
        remove_field => [ "[process][command_line]" ]
      }
    }

    # if left intact, this will break downstream processing since it doesn't match an IP type
    if [remote][ip] == "*" {
      mutate {
        remove_field => [ "[remote][ip]" ]
      }
    }

    if [process][start] and [process][end] {
      ruby {
        init => "require 'date'"
        code => "event.set('event.duration', (event.get('[process][end]') - event.get('[process][start]')))"
        add_tag => [ "calculated_duration" ]
      }   
    }

    # Handle empty, null, or otherwise non-applicable fields
    if [process][session_id] == "N/A" or [process][session_id] == "null" {
      mutate {
        remove_field => [ "[process][session_id]" ]
      }
    }
    if [process][file_output] == "Disabled" {
      mutate {
        remove_field => [ "[process][file_output]" ]
      }
    }

    # Convert field types
    mutate {
      convert => {
        "[process][pid]" => "integer"
        "[process][parent][pid]" => "integer"
        "[process][thread][count]" => "integer"
        "[process][handle][count]" => "integer"
        "[process][wow64]" => "boolean"
        "[process][session_id]" => "integer"
        "[process][offset_v]" => "integer"
      }

      lowercase => [ "[network][type]", "[network][state]", "[network][transport]" ]
    }
  }
}

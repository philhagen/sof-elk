# (C)2026 Lewes Technology Consulting, LLC
#
# This file parses Windows Prefetch (.pf) records emitted by PECmd
# (Eric Zimmerman) via the KAPE forensic tool.
#
# Each prefetch file records up to 8 execution timestamps (LastRun +
# PreviousRun0..PreviousRun6). To make the timeline panels meaningful, this
# parser EXPLODES each PECmd row into one ES document per recorded run
# timestamp, so 1 prefetch file with 8 runs yields 8 separate events.
#
# PECmd CSV/JSON schema (27 columns):
#   Note, SourceFilename, SourceCreated, SourceModified, SourceAccessed,
#   ExecutableName, Hash, Size, Version, RunCount, LastRun,
#   PreviousRun0..PreviousRun6, Volume0Name, Volume0Serial, Volume0Created,
#   Volume1Name, Volume1Serial, Volume1Created, Directories, FilesLoaded,
#   ParsingError

filter {
  if [labels][type] == "kape_prefetch" {

    # ---------- INPUT NORMALIZATION ----------
    # 1001-preprocess-json.conf has already json-parsed [message] into [raw].
    # PECmd JSON keys come in two forms depending on the path:
    #   (a) PECmd --json native:  PascalCase  ([raw][SourceFilename], ...)
    #   (b) csv2json.py from --csv: lowercased ([raw][sourcefilename], ...)
    # Normalize (b) up to PascalCase so the main rename has one form to handle.

    if ![raw][SourceFilename] and [raw][sourcefilename] {
      mutate {
        rename => {
          "[raw][note]"            => "[raw][Note]"
          "[raw][sourcefilename]"  => "[raw][SourceFilename]"
          "[raw][sourcecreated]"   => "[raw][SourceCreated]"
          "[raw][sourcemodified]"  => "[raw][SourceModified]"
          "[raw][sourceaccessed]"  => "[raw][SourceAccessed]"
          "[raw][executablename]"  => "[raw][ExecutableName]"
          "[raw][hash]"            => "[raw][Hash]"
          "[raw][size]"            => "[raw][Size]"
          "[raw][version]"         => "[raw][Version]"
          "[raw][runcount]"        => "[raw][RunCount]"
          "[raw][lastrun]"         => "[raw][LastRun]"
          "[raw][previousrun0]"    => "[raw][PreviousRun0]"
          "[raw][previousrun1]"    => "[raw][PreviousRun1]"
          "[raw][previousrun2]"    => "[raw][PreviousRun2]"
          "[raw][previousrun3]"    => "[raw][PreviousRun3]"
          "[raw][previousrun4]"    => "[raw][PreviousRun4]"
          "[raw][previousrun5]"    => "[raw][PreviousRun5]"
          "[raw][previousrun6]"    => "[raw][PreviousRun6]"
          "[raw][volume0name]"     => "[raw][Volume0Name]"
          "[raw][volume0serial]"   => "[raw][Volume0Serial]"
          "[raw][volume0created]"  => "[raw][Volume0Created]"
          "[raw][volume1name]"     => "[raw][Volume1Name]"
          "[raw][volume1serial]"   => "[raw][Volume1Serial]"
          "[raw][volume1created]"  => "[raw][Volume1Created]"
          "[raw][directories]"     => "[raw][Directories]"
          "[raw][filesloaded]"     => "[raw][FilesLoaded]"
          "[raw][parsingerror]"    => "[raw][ParsingError]"
        }
      }
    }

    # ---------- FIELD RENAMES ----------
    mutate {
      rename => {
        "[raw][Note]"            => "[prefetch][note]"
        "[raw][SourceFilename]"  => "[prefetch][source_filename]"
        "[raw][SourceCreated]"   => "[prefetch][source][created]"
        "[raw][SourceModified]"  => "[prefetch][source][mtime]"
        "[raw][SourceAccessed]"  => "[prefetch][source][accessed]"
        "[raw][ExecutableName]"  => "[prefetch][executable_name]"
        "[raw][Hash]"            => "[prefetch][hash]"
        "[raw][Size]"            => "[prefetch][size]"
        "[raw][Version]"         => "[prefetch][version]"
        "[raw][RunCount]"        => "[prefetch][run_count]"
        "[raw][Volume0Name]"     => "[prefetch][volume0][name]"
        "[raw][Volume0Serial]"   => "[prefetch][volume0][serial]"
        "[raw][Volume0Created]"  => "[prefetch][volume0][created]"
        "[raw][Volume1Name]"     => "[prefetch][volume1][name]"
        "[raw][Volume1Serial]"   => "[prefetch][volume1][serial]"
        "[raw][Volume1Created]"  => "[prefetch][volume1][created]"
        "[raw][Directories]"     => "[prefetch][directories]"
        "[raw][FilesLoaded]"     => "[prefetch][files_loaded]"
        "[raw][ParsingError]"    => "[prefetch][parsing_error]"
      }
    }

    # Move run timestamps to their own subnamespace so the splitter has
    # a tidy place to read them from.
    mutate {
      rename => {
        "[raw][LastRun]"         => "[prefetch][runs][last]"
        "[raw][PreviousRun0]"    => "[prefetch][runs][previous_0]"
        "[raw][PreviousRun1]"    => "[prefetch][runs][previous_1]"
        "[raw][PreviousRun2]"    => "[prefetch][runs][previous_2]"
        "[raw][PreviousRun3]"    => "[prefetch][runs][previous_3]"
        "[raw][PreviousRun4]"    => "[prefetch][runs][previous_4]"
        "[raw][PreviousRun5]"    => "[prefetch][runs][previous_5]"
        "[raw][PreviousRun6]"    => "[prefetch][runs][previous_6]"
      }
    }

    # ---------- TYPE NORMALIZATION ----------
    mutate {
      convert => {
        "[prefetch][run_count]"            => "integer"
        "[prefetch][size]"                 => "integer"
        "[prefetch][parsing_error]"        => "boolean"
      }
    }

    # ---------- DIRECTORIES / FILES_LOADED ARRAY SPLIT ----------
    # PECmd packs these as ", "-joined strings. Convert to arrays so they're
    # queryable and aggregatable.
    if [prefetch][directories] {
      mutate { split => { "[prefetch][directories]" => ", " } }
    }
    if [prefetch][files_loaded] {
      mutate { split => { "[prefetch][files_loaded]" => ", " } }
    }

    # ---------- HOSTNAME EXTRACTION ----------
    # KAPE convention for PECmd output filename:
    #   <YYYYMMDDHHMMSS>_PECmd_Output.csv|json
    # The timestamp here is the KAPE collection time, not a runtime. We
    # don't extract a hostname from this format (it's a global file, not
    # per-user). The host comes from filebeat agent metadata.

    # ---------- EXECUTABLE PATH ENRICHMENT ----------
    # SourceFilename example: "L:\C\Windows\prefetch\ANYDESK.EXE-9CE60CD9.pf"
    # We want to derive the *execution path* of the binary (which prefetch
    # records via Volume0/Volume1 + the path embedded in FilesLoaded), and
    # tag based on where the executable lived.
    ruby {
      code => '
        bs = 92.chr
        # Find the actual executable path inside files_loaded.
        # Heuristic: first entry that ends with the same filename as
        # [prefetch][executable_name] (case-insensitive).
        exe_name = event.get("[prefetch][executable_name]")
        files = event.get("[prefetch][files_loaded]")
        if exe_name.is_a?(String) && files.is_a?(Array)
          exe_upper = exe_name.upcase
          match = files.find { |f| f.is_a?(String) && f.upcase.end_with?(bs + exe_upper) }
          if match
            event.set("[prefetch][executable_path]", match)
          end
        end
      '
    }

    # ---------- RUN-TIMESTAMP EXPLOSION ----------
    # Build an array of all non-empty run timestamps. The original event
    # keeps the FIRST one (LastRun) as its run_time; for every additional
    # one we emit a cloned event so the timeline panels see each execution
    # as a distinct point.
    ruby {
      code => '
        run_fields = [
          ["[prefetch][runs][last]",       "last"],
          ["[prefetch][runs][previous_0]", "previous"],
          ["[prefetch][runs][previous_1]", "previous"],
          ["[prefetch][runs][previous_2]", "previous"],
          ["[prefetch][runs][previous_3]", "previous"],
          ["[prefetch][runs][previous_4]", "previous"],
          ["[prefetch][runs][previous_5]", "previous"],
          ["[prefetch][runs][previous_6]", "previous"]
        ]
        run_times = []
        run_fields.each do |field, kind|
          v = event.get(field)
          run_times << [v, kind] if v.is_a?(String) && v.length > 0
        end

        event.set("[prefetch][available_run_count]", run_times.length)
        event.set("[prefetch][run_timestamps]", run_times.map { |t, _| t })

        if run_times.length > 0
          ts, kind = run_times[0]
          event.set("[prefetch][run_time]", ts)
          event.set("[prefetch][run_kind]", kind)
          event.set("[prefetch][run_position]", 0)
        else
          srcmod = event.get("[prefetch][source][mtime]")
          event.set("[prefetch][run_time]", srcmod) if srcmod
          event.set("[prefetch][run_kind]", "unknown")
          event.set("[prefetch][run_position]", 0)
        end

        # Clone for each additional run time (positions 1..7)
        if run_times.length > 1
          run_times[1..-1].each_with_index do |(ts, kind), idx|
            clone = event.clone
            clone.set("[prefetch][run_time]", ts)
            clone.set("[prefetch][run_kind]", kind)
            clone.set("[prefetch][run_position]", idx + 1)
            new_event_block.call(clone)
          end
        end
      '
    }

    # ---------- TIMESTAMP NORMALIZATION ----------
    # SBECmd-style PECmd timestamp format: yyyy-MM-dd HH:mm:ss.SSSSSSS
    # (7-digit microsecond precision) — also handle ISO8601 fallback.
    if [prefetch][run_time] {
      date {
        match => [ "[prefetch][run_time]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
      }
      date {
        match => [ "[prefetch][run_time]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[prefetch][run_time]"
      }
    }

    # In-place date conversion for the other timestamp fields
    if [prefetch][source][created] and [prefetch][source][created] != "" {
      date {
        match => [ "[prefetch][source][created]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS", "yyyy-MM-dd HH:mm:ss", "ISO8601" ]
        target => "[prefetch][source][created]"
      }
    }
    if [prefetch][source][mtime] and [prefetch][source][mtime] != "" {
      date {
        match => [ "[prefetch][source][mtime]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS", "yyyy-MM-dd HH:mm:ss", "ISO8601" ]
        target => "[prefetch][source][mtime]"
      }
    }
    if [prefetch][source][accessed] and [prefetch][source][accessed] != "" {
      date {
        match => [ "[prefetch][source][accessed]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS", "yyyy-MM-dd HH:mm:ss", "ISO8601" ]
        target => "[prefetch][source][accessed]"
      }
    }
    if [prefetch][volume0][created] and [prefetch][volume0][created] != "" {
      date {
        match => [ "[prefetch][volume0][created]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS", "yyyy-MM-dd HH:mm:ss", "ISO8601" ]
        target => "[prefetch][volume0][created]"
      }
    }
    if [prefetch][volume1][created] and [prefetch][volume1][created] != "" {
      date {
        match => [ "[prefetch][volume1][created]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS", "yyyy-MM-dd HH:mm:ss", "ISO8601" ]
        target => "[prefetch][volume1][created]"
      }
    }

    # ---------- INSIDER-THREAT ENRICHMENTS ----------
    # All tagging in one Ruby filter (same approach as 6505 shellbags).
    # Heuristics — none are definitive on their own, all are useful as
    # filter starting points:
    #   prefetch_user_profile       — executed from C:\Users\... (binary
    #                                 dropped/launched out of a user profile,
    #                                 a common ATT&CK persistence/exec spot)
    #   prefetch_temp_location      — Temp, AppData\Local\Temp, ProgramData
    #                                 (frequent dropper / staging location)
    #   prefetch_nonsystem_drive    — Volume0Name or executable_path on D:\+
    #                                 (might be removable media or mapped drive)
    #   prefetch_remote_access      — name matches common RAT / remote tools
    #   prefetch_admin_tool         — dual-use admin/recon binaries
    #   prefetch_single_run         — RunCount == 1 (often one-shot tool use)
    #   prefetch_frequent_use       — RunCount >= 50 (likely legit / noisy)

    ruby {
      code => '
        bs = 92.chr
        exe_name = event.get("[prefetch][executable_name]") || ""
        exe_path = event.get("[prefetch][executable_path]") || ""
        run_count = event.get("[prefetch][run_count]") || 0
        vol0_name = event.get("[prefetch][volume0][name]") || ""

        existing = event.get("tags") || []
        existing = [existing] unless existing.is_a?(Array)
        new_tags = []

        # Location-based — check both the volume name (for drive letter) and the path
        path_upper = exe_path.upcase

        if path_upper.include?(bs + "USERS" + bs)
          new_tags << "prefetch_user_profile"
        end
        if path_upper.include?(bs + "TEMP" + bs) ||
           path_upper.include?(bs + "APPDATA" + bs + "LOCAL" + bs + "TEMP" + bs) ||
           path_upper.include?(bs + "PROGRAMDATA" + bs)
          new_tags << "prefetch_temp_location"
        end

        # Drive-letter heuristic — only system drive (C:) is "normal" for
        # executables. PECmd records the volume the binary was loaded FROM
        # in Volume0Name (e.g., \VOLUME{GUID}); we look at the path instead
        # since the volume name is GUID-based.
        # Look for a drive-letter prefix in the executable_path (after the
        # GUID prefix). The volume root is the start of path; subsequent
        # paths begin with the volume reference. Practical check: if there
        # is a Volume1Name AND it differs from Volume0Name, the executable
        # touched multiple volumes — interesting on its own.
        if !vol0_name.empty? && !event.get("[prefetch][volume1][name]").to_s.empty?
          new_tags << "prefetch_multi_volume"
        end

        # Executable-name-based heuristics. Lower-cased for compare.
        name_lower = exe_name.downcase
        remote_access_tools = %w[
          anydesk teamviewer logmein chrome_remote_desktop tightvnc realvnc ultravnc
          screenconnect connectwise splashtop dwagent radmin assist remote pc
        ]
        if remote_access_tools.any? { |t| name_lower.include?(t) }
          new_tags << "prefetch_remote_access"
        end

        admin_dual_use = %w[
          psexec.exe paexec.exe powershell.exe cmd.exe wmic.exe certutil.exe
          bitsadmin.exe nltest.exe net.exe net1.exe netsh.exe whoami.exe
          tasklist.exe taskkill.exe schtasks.exe at.exe sc.exe reg.exe
          regedit.exe rundll32.exe mshta.exe wscript.exe cscript.exe
          procdump.exe procmon.exe lsass.exe mimikatz.exe
        ]
        if admin_dual_use.any? { |t| name_lower.start_with?(t) }
          new_tags << "prefetch_admin_tool"
        end

        # Run-count heuristics
        if run_count == 1
          new_tags << "prefetch_single_run"
        elsif run_count >= 50
          new_tags << "prefetch_frequent_use"
        end

        # Parsing failure tag
        if event.get("[prefetch][parsing_error]") == true
          new_tags << "prefetch_parse_error"
        end

        if new_tags.length > 0
          event.set("tags", existing + new_tags)
        end
      '
    }

    # ---------- MESSAGE ----------
    if [prefetch][executable_name] {
      mutate {
        replace => { "message" => "Prefetch execution: %{[prefetch][executable_name]} (run_kind=%{[prefetch][run_kind]})" }
      }
    }

    # ---------- CLEANUP ----------
    mutate {
      remove_field => [ "raw" ]
    }
  }
}

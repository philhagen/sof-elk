# SOF-ELK® Configuration File
# (C)2026 Lewes Technology Consulting, LLC
#
# This file parses Hindsight (https://github.com/obsidianforensics/hindsight)
# Internet History output — covering Chromium-based browsers (Chrome, Edge,
# Brave, Opera, Vivaldi, etc.). Input is one JSON-per-line, either from
# Hindsight's native --format=jsonl or from supporting-scripts/hindsight2json.py
# applied to a Hindsight xlsx workbook (Timeline sheet).
#
# Timeline schema (21 columns, post-lowercase normalization):
#   type, timestamp_utc, url, title__name__status, data__value__path,
#   interpretation, profile, source,
#   visit_id, from_visit, visit_duration, visit_count, typed_count,
#   url_hidden, transition,                     <- URL-specific
#   interrupt_reason, danger_type, opened,      <- DOWNLOAD-specific
#   etag, last_modified, all_http_headers       <- CACHE-specific
#
# Per-record types observed in real Hindsight output:
#   url, download, autofill, site setting (modified),
#   site setting (engagement), preference (session)
#
# This parser routes/tags by type. Downloads get the heaviest enrichment
# (interrupt status, Edge danger-type, opened?, derived extension).

filter {
  if [labels][type] == "browser_history" {

    # ---------- INPUT NORMALIZATION ----------
    # 1001-preprocess-json.conf already json-parsed [message] into [raw].
    # Hindsight2json lowercases everything, so [raw][type], [raw][url], etc.

    # ---------- FIELD RENAMES ----------
    mutate {
      rename => {
        "[raw][type]"                  => "[browser][record_type]"
        "[raw][timestamp_utc]"         => "[browser][timestamp_utc]"
        "[raw][url]"                   => "[browser][url]"
        "[raw][title__name__status]"   => "[browser][title]"
        "[raw][data__value__path]"     => "[browser][data]"
        "[raw][interpretation]"        => "[browser][interpretation]"
        "[raw][profile]"               => "[browser][profile_path]"
        "[raw][source]"                => "[browser][source]"

        "[raw][visit_id]"              => "[browser][visit][id]"
        "[raw][from_visit]"            => "[browser][visit][from_id]"
        "[raw][visit_duration]"        => "[browser][visit][duration]"
        "[raw][visit_count]"           => "[browser][visit][count]"
        "[raw][typed_count]"           => "[browser][visit][typed_count]"
        "[raw][url_hidden]"            => "[browser][visit][url_hidden]"
        "[raw][transition]"            => "[browser][visit][transition]"

        "[raw][interrupt_reason]"      => "[browser][download][interrupt_reason]"
        "[raw][danger_type]"           => "[browser][download][danger_type]"
        "[raw][opened]"                => "[browser][download][opened]"

        "[raw][etag]"                  => "[browser][cache][etag]"
        "[raw][last_modified]"         => "[browser][cache][last_modified]"
        "[raw][all_http_headers]"      => "[browser][cache][http_headers]"
      }
    }

    # ---------- TYPE COERCION ----------
    mutate {
      convert => {
        "[browser][visit][count]"        => "integer"
        "[browser][visit][typed_count]"  => "integer"
        "[browser][visit][duration]"     => "integer"
      }
    }

    # ---------- TIMESTAMP ----------
    # Hindsight Timestamp (UTC) format: yyyy-MM-dd HH:mm:ss.SSS
    if [browser][timestamp_utc] {
      date {
        match => [ "[browser][timestamp_utc]",
                   "yyyy-MM-dd HH:mm:ss.SSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
      }
    }

    # ---------- DOWNLOAD-SPECIFIC ENRICHMENT ----------
    # For download records, [browser][data] holds the local file path.
    # Promote it to file.path and extract the extension for easy filtering.
    if [browser][record_type] == "download" and [browser][data] {
      mutate {
        copy => { "[browser][data]" => "[file][path]" }
      }
      # Extract file extension via Ruby (more reliable than grok for backslash paths)
      ruby {
        code => '
          path = event.get("[file][path]")
          if path.is_a?(String)
            base = path.split(/[\\\/]/).last
            event.set("[file][name]", base) if base
            if base && base.include?(".")
              ext = base.split(".").last.downcase
              event.set("[file][extension]", ext) if ext.length <= 8
            end
          end
        '
      }
    }

    # ---------- BROWSER & USER ATTRIBUTION ----------
    # Profile path examples:
    #   /Volumes/ITSupport/C/Users/ITSupport/AppData/Local/Microsoft/Edge/User Data/Default
    #   C:\Users\jdoe\AppData\Local\Google\Chrome\User Data\Profile 1
    #
    # browser.source_tool + browser.family are the cross-tool fields shared
    # with 6509-browser_nirsoft.conf so the Browser Distribution Lens donut
    # can group across both parsers. Keep family values lowercase to match.
    mutate {
      add_field => { "[browser][source_tool]" => "hindsight" }
    }
    ruby {
      code => '
        p = event.get("[browser][profile_path]")
        if p.is_a?(String)
          pu = p.upcase

          # Browser family — lowercase, normalized to match 6509-browser_nirsoft
          if pu.include?("MICROSOFT/EDGE") || pu.include?("MICROSOFT\\EDGE")
            event.set("[browser][family]", "edge")
          elsif pu.include?("GOOGLE/CHROME") || pu.include?("GOOGLE\\CHROME")
            event.set("[browser][family]", "chrome")
          elsif pu.include?("BRAVESOFTWARE") || pu.include?("BRAVE-BROWSER")
            event.set("[browser][family]", "brave")
          elsif pu.include?("OPERA SOFTWARE") || pu.include?("OPERA\\")
            event.set("[browser][family]", "opera")
          elsif pu.include?("VIVALDI")
            event.set("[browser][family]", "vivaldi")
          else
            event.set("[browser][family]", "other")
          end

          # Username from \Users\<name>\AppData\... (or /Users/<name>/...)
          m = p.match(/[\\\/]Users[\\\/]([^\\\/]+)[\\\/]AppData/i)
          if m
            event.set("[user][name]", m[1])
            event.set("[browser][profile_user]", m[1])
          end

          # Profile name (Default, Profile 1, etc.)
          # Take the last path segment after splitting on / or \
          last = p.split(/[\\\/]/).last
          event.set("[browser][profile_name]", last) if last
        end
      '
    }

    # ---------- INSIDER-THREAT TAGGING ----------
    ruby {
      code => '
        rtype  = (event.get("[browser][record_type]") || "").to_s
        url    = (event.get("[browser][url]") || "").to_s
        urll   = url.downcase
        fpath  = (event.get("[file][path]") || "").to_s
        fext   = (event.get("[file][extension]") || "").to_s
        title  = (event.get("[browser][title]") || "").to_s
        danger = (event.get("[browser][download][danger_type]") || "").to_s
        opened = (event.get("[browser][download][opened]") || "").to_s
        intrpt = (event.get("[browser][download][interrupt_reason]") || "").to_s
        typed  = event.get("[browser][visit][typed_count]")

        existing = event.get("tags") || []
        existing = [existing] unless existing.is_a?(Array)
        new_tags = []

        # ---- Record-type flat tags ----
        case rtype
        when "download"
          new_tags << "browser_download"
        when "url"
          new_tags << "browser_url_visit"
        when "autofill"
          new_tags << "browser_autofill"
        when /site setting/
          new_tags << "browser_site_permission"
        when /preference/
          new_tags << "browser_session_event"
        end

        # ---- Download enrichment tags (the headliners) ----
        if rtype == "download"
          # Edge / Chrome flagged the download as dangerous in any way
          if danger =~ /malicious/i || danger =~ /dangerous/i || danger =~ /uncommon/i ||
             danger =~ /unwanted/i || danger =~ /unverified/i || danger =~ /host/i
            new_tags << "browser_download_dangerous"
          end
          # User clicked Open / Run after downloading
          if opened == "Yes" || opened == true
            new_tags << "browser_download_opened"
          end
          # Download was interrupted (cancelled, network, virus-scanner-blocked, etc.)
          if intrpt.length > 0 && intrpt != "No Interrupt"
            new_tags << "browser_download_interrupted"
          end

          # File-extension class tags
          case fext
          when "exe","msi","bat","cmd","ps1","vbs","js","scr","com","cpl","dll","hta","jse","wsf","msc"
            new_tags << "browser_download_executable"
          when "zip","rar","7z","tar","gz","bz2","xz","iso","cab"
            new_tags << "browser_download_archive"
          when "doc","docx","xls","xlsx","ppt","pptx","pdf","rtf","odt","ods","odp"
            new_tags << "browser_download_office_or_doc"
          when "mp4","mov","avi","mkv","mp3","wav","jpg","jpeg","png","gif","bmp","heic"
            new_tags << "browser_download_media"
          end
        end

        # ---- URL category tags (insider-threat indicators) ----
        # File-sharing / anonymous transfer
        if urll.include?("wetransfer.com") || urll.include?("mega.nz") ||
           urll.include?("mega.io") || urll.include?("mediafire.com") ||
           urll.include?("anonfiles.com") || urll.include?("sendspace.com") ||
           urll.include?("transfer.sh") || urll.include?("file.io") ||
           urll.include?("rapidshare") || urll.include?("4shared.com") ||
           urll.include?("zippyshare") || urll.include?("gofile.io") ||
           urll.include?("temp.sh") || urll.include?("pixeldrain.com")
          new_tags << "browser_file_sharing"
        end

        # Personal cloud storage (corporate-tenant variants excluded heuristically)
        if urll.include?("drive.google.com") || urll.include?("docs.google.com") ||
           urll.include?("onedrive.live.com") || urll.include?("dropbox.com") ||
           urll.include?("icloud.com") || urll.include?("box.com") ||
           urll.include?("pcloud.com") || urll.include?("sync.com")
          new_tags << "browser_cloud_storage"
        end

        # Personal webmail
        if urll.include?("mail.google.com") || urll.include?("gmail.com") ||
           urll.include?("outlook.live.com") || urll.include?("hotmail.com") ||
           urll.include?("mail.yahoo.com") || urll.include?("protonmail.com") ||
           urll.include?("proton.me") || urll.include?("tutanota.com") ||
           urll.include?("zoho.com/mail") || urll.include?("aol.com/mail")
          new_tags << "browser_webmail_personal"
        end

        # Job-search / departure signals
        if urll.include?("linkedin.com/jobs") || urll.include?("indeed.com") ||
           urll.include?("monster.com") || urll.include?("ziprecruiter.com") ||
           urll.include?("glassdoor.com") || urll.include?("dice.com") ||
           urll.include?("careerbuilder.com") || urll.include?("workday.com") ||
           urll.include?("greenhouse.io") || urll.include?("lever.co")
          new_tags << "browser_job_search"
        end

        # AI / generative tools (modern data-exfiltration channel)
        if urll.include?("chat.openai.com") || urll.include?("chatgpt.com") ||
           urll.include?("claude.ai") || urll.include?("gemini.google.com") ||
           urll.include?("bard.google.com") || urll.include?("copilot.microsoft.com") ||
           urll.include?("perplexity.ai")
          new_tags << "browser_ai_assistant"
        end

        # Canary tokens (deliberate-bait detection)
        if urll.include?("canarytokens.org") || urll.include?("canarytokens.com")
          new_tags << "browser_canary_token"
        end

        # Typed URL — user typed the address rather than clicking a link.
        # Strong intent signal: "I typed mega.nz into the address bar".
        if typed.is_a?(Integer) && typed > 0
          new_tags << "browser_url_typed"
        end

        event.set("tags", existing + new_tags) if new_tags.length > 0
      '
    }

    # ---------- MESSAGE ----------
    if [browser][record_type] == "download" {
      mutate { replace => { "message" => "Download: %{[browser][title]} from %{[browser][url]}" } }
    } else if [browser][record_type] == "url" {
      mutate { replace => { "message" => "Visit: %{[browser][url]}" } }
    } else if [browser][record_type] {
      mutate { replace => { "message" => "Browser [%{[browser][record_type]}] %{[browser][url]}" } }
    }

    # ---------- CLEANUP ----------
    mutate {
      remove_field => [ "raw" ]
    }
  }
}

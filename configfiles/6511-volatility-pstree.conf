#
# This file parses Volatility 3 windows.pstree.PsTree JSON output, using
# Phil's supporting-scripts/volatility-flatten-pstree.rb to recursively
# flatten the tree structure into a single flat process list with a
# process_depth field added to each entry, then explodes that list into
# one ES document per process.
#
# Input shape (Volatility 3 with `-r json`):
#   [
#     {                                                  # root #1 (usually System)
#       "Audit": null,
#       "Cmd": null,
#       "CreateTime": "2024-01-15T10:23:45.123456+00:00",
#       "ExitTime": null,
#       "Handles": null,
#       "ImageFileName": "System",
#       "Offset(V)": "0xaa00b2c0e040",
#       "PID": 4,
#       "PPID": 0,
#       "SessionId": null,
#       "Threads": 200,
#       "Wow64": false,
#       "__children": [ { ...PID 92 Registry... }, ... ]
#     },
#     ...                                                # additional roots if any
#   ]
#
# Ingest convention:
#   * Run Volatility 3 with `-r json -o out.json windows.pstree.PsTree` (or
#     pipe to a file).
#   * If the file is a pretty-printed JSON ARRAY, convert to NDJSON first:
#         jq -c '.[]' out.json > out_pstree.json
#     so each root process tree becomes one line. Filebeat then ingests
#     each line as one event.
#   * Drop *pstree*.json or *volatility*pstree*.json into /logstash/kape/.

filter {
  if [labels][type] == "volatility_pstree" {

    # ---------- DEFENSIVE INPUT SHAPING ----------
    # 1001-preprocess-json.conf parsed [message] into [raw]. For the typical
    # NDJSON-per-root input, [raw] is a single Hash containing one root
    # process tree. If the user instead drops a raw JSON array (uncommon
    # but possible), [raw] is an Array — handle that by splitting first
    # so each root becomes its own event.
    if [raw] {
      ruby {
        code => '
          r = event.get("[raw]")
          if r.is_a?(Array)
            # Mark this so we know to split below. Logstash split filter
            # needs a field path to split on.
            event.set("[@metadata][vol_root_list]", true)
          end
        '
      }
      if [@metadata][vol_root_list] {
        split { field => "[raw]" }
      }
    }

    # ---------- FLATTEN THE TREE ----------
    # Phil's recursive ruby filter (supporting-scripts/volatility-flatten-pstree.rb).
    # Reads the source tree at [raw], walks __children depth-first, adds
    # process_depth=N to each node, and writes the resulting flat array
    # to [processes].
    ruby {
      path => "/usr/local/sof-elk/supporting-scripts/volatility-flatten-pstree.rb"
      script_params => {
        "source" => "[raw]"
        "target" => "[processes]"
      }
    }

    # ---------- ONE EVENT PER PROCESS ----------
    # After flatten, [processes] is an array of process hashes. Split it so
    # each process becomes its own ES document.
    if [processes] {
      split { field => "[processes]" }
    }

    # ---------- FIELD RENAMES (per-process) ----------
    # Volatility's "Offset(V)" key has literal parentheses, which Logstash
    # field-reference syntax dislikes. Rename early.
    if [processes][Offset(V)] {
      mutate {
        rename => { "[processes][Offset(V)]" => "[processes][OffsetV]" }
      }
    }

    mutate {
      rename => {
        "[processes][PID]"            => "[process][pid]"
        "[processes][PPID]"           => "[process][parent][pid]"
        "[processes][ImageFileName]"  => "[process][name]"
        "[processes][Audit]"          => "[process][executable]"
        "[processes][Cmd]"            => "[process][command_line]"
        "[processes][CreateTime]"     => "[process][start]"
        "[processes][ExitTime]"       => "[process][end]"
        "[processes][Threads]"        => "[process][thread_count]"
        "[processes][Handles]"        => "[process][handle_count]"
        "[processes][Wow64]"          => "[process][wow64]"
        "[processes][SessionId]"      => "[process][session_id]"
        "[processes][process_depth]"  => "[process][depth]"
        "[processes][OffsetV]"        => "[volatility][offset_v]"
      }
    }

    mutate {
      convert => {
        "[process][pid]"           => "integer"
        "[process][parent][pid]"   => "integer"
        "[process][thread_count]"  => "integer"
        "[process][handle_count]"  => "integer"
        "[process][session_id]"    => "integer"
        "[process][depth]"         => "integer"
        "[process][wow64]"         => "boolean"
      }
      add_field => {
        "[volatility][plugin]" => "windows.pstree.PsTree"
      }
    }

    # ---------- TIMESTAMP ----------
    # Volatility CreateTime is ISO8601 with timezone offset, e.g.:
    #   2024-01-15T10:23:45.123456+00:00
    # Use ISO8601 matcher to set @timestamp. Many processes (System,
    # kernel threads) carry no CreateTime — those keep their default
    # ingest-time @timestamp, which is fine for the pstree use case.
    if [process][start] and [process][start] != "" {
      date {
        match => [ "[process][start]", "ISO8601" ]
      }
      date {
        match => [ "[process][start]", "ISO8601" ]
        target => "[process][start]"
      }
    }
    if [process][end] and [process][end] != "" {
      date {
        match => [ "[process][end]", "ISO8601" ]
        target => "[process][end]"
      }
    }

    # ---------- DERIVED FIELDS ----------
    # process.executable_directory = directory portion of the kernel-audit
    # path. Useful for "where is this binary running from" tagging below.
    if [process][executable] and [process][executable] != "" {
      ruby {
        code => '
          path = event.get("[process][executable]").to_s
          # Audit paths use \ as separator (Windows kernel paths). Split on
          # the last \, everything before = dir, everything after = exe name.
          bs = 92.chr
          idx = path.rindex(bs)
          if idx
            event.set("[process][executable_directory]", path[0, idx])
          end
        '
      }
    }

    # ---------- DUMP-FILE PROVENANCE ----------
    # Tag every event with the on-disk Volatility output file it came from
    # so dashboards can group by source memory dump.
    if [log][file][path] {
      mutate {
        copy => { "[log][file][path]" => "[volatility][source_file]" }
      }
    }

    # ---------- INSIDER-THREAT TAGGING ----------
    ruby {
      code => '
        name     = (event.get("[process][name]") || "").to_s.downcase
        exe      = (event.get("[process][executable]") || "").to_s
        exedir   = (event.get("[process][executable_directory]") || "").to_s
        exeu     = exedir.upcase
        cmd      = (event.get("[process][command_line]") || "").to_s
        depth    = (event.get("[process][depth]") || 0).to_i

        existing = event.get("tags") || []
        existing = [existing] unless existing.is_a?(Array)
        new_tags = []

        # ---- Suspicious execution locations ----
        # Tag anything running out of locations malware/persistence
        # commonly favor (Temp / user AppData / Downloads / Public / etc.)
        bs = 92.chr
        sus_markers = [
          "USERS" + bs,                                    # any C:\Users\... path
          "APPDATA" + bs + "LOCAL" + bs + "TEMP",
          "APPDATA" + bs + "ROAMING",
          "PROGRAMDATA",
          "WINDOWS" + bs + "TEMP",
          "PUBLIC" + bs,
          "DOWNLOADS" + bs,
          "RECYCLE.BIN"
        ]
        sus_markers.each do |m|
          if exeu.include?(m)
            new_tags << "vol_suspicious_path"
            break
          end
        end

        # ---- LOLBin executables ----
        # Living-off-the-land binaries — legit Windows utilities frequently
        # abused for execution, lateral movement, defense evasion. Source:
        # LOLBAS-Project subset.
        lolbins = %w[
          regsvr32.exe rundll32.exe mshta.exe certutil.exe bitsadmin.exe
          installutil.exe msbuild.exe regasm.exe regsvcs.exe wmic.exe
          wscript.exe cscript.exe msiexec.exe forfiles.exe pcalua.exe
          esentutl.exe makecab.exe expand.exe ieexec.exe diskshadow.exe
          atbroker.exe ftp.exe csi.exe dnscmd.exe odbcconf.exe
          xwizard.exe scriptrunner.exe presentationhost.exe
        ]
        if lolbins.include?(name)
          new_tags << "vol_lolbin"
        end

        # ---- Misplaced system binaries ----
        # Well-known Windows binaries running from non-System32/SysWOW64
        # locations are a strong rootkit / process-hollowing signal.
        system_binaries = %w[
          svchost.exe lsass.exe csrss.exe winlogon.exe services.exe
          smss.exe wininit.exe spoolsv.exe explorer.exe taskhost.exe
          taskhostw.exe dwm.exe sihost.exe ctfmon.exe runtimebroker.exe
        ]
        if system_binaries.include?(name) && exeu.length > 0 &&
           !exeu.include?("WINDOWS" + bs + "SYSTEM32") &&
           !exeu.include?("WINDOWS" + bs + "SYSWOW64") &&
           !exeu.include?("WINDOWS" + bs + "WINSXS")
          new_tags << "vol_misplaced_system_binary"
        end

        # ---- Powershell / interactive shells ----
        if name == "powershell.exe" || name == "pwsh.exe"
          new_tags << "vol_powershell"
          # Encoded / hidden / nop-flagged invocations are high-signal
          if cmd =~ /-enc(odedcommand)?\b/i ||
             cmd =~ /-nop\b/i ||
             cmd =~ /-w(indowstyle)? ?h(idden)?\b/i ||
             cmd =~ /-e[xc]\b/i
            new_tags << "vol_powershell_evasive"
          end
        end
        if name == "cmd.exe"
          new_tags << "vol_cmd_shell"
        end

        # ---- Process with no command line (often hidden/injected) ----
        # Genuine processes almost always carry a command line. PID 0
        # (System Idle) and PID 4 (System) legitimately lack one.
        pid = (event.get("[process][pid]") || 0).to_i
        if cmd.empty? && pid > 4
          new_tags << "vol_no_command_line"
        end

        # ---- Deep process tree ----
        # Pstree depths beyond ~5 are unusual for normal Windows operation
        # and can indicate launcher/loader chains.
        if depth >= 5
          new_tags << "vol_deep_tree"
        end

        # ---- Remote access / lateral movement tooling ----
        remote_tools = %w[
          psexec.exe psexec64.exe paexec.exe winrm.exe mstsc.exe
          tightvnc.exe vncviewer.exe teamviewer.exe anydesk.exe
          plink.exe putty.exe winscp.exe
        ]
        if remote_tools.include?(name)
          new_tags << "vol_remote_access_tool"
        end

        # ---- Office app spawning a shell (macro/exploit signature) ----
        # We do not have the parent name on the same event — that requires
        # post-ingest correlation via process.parent.pid -> process.pid.
        # Leave as a Lens/dashboard query rather than a parser-time tag.

        event.set("tags", (existing + new_tags).uniq) if new_tags.length > 0
      '
    }

    # ---------- MESSAGE FIELD ----------
    if [process][name] and [process][pid] {
      if [process][command_line] {
        mutate {
          replace => { "message" => "[PID %{[process][pid]} depth=%{[process][depth]}] %{[process][name]} : %{[process][command_line]}" }
        }
      } else {
        mutate {
          replace => { "message" => "[PID %{[process][pid]} depth=%{[process][depth]}] %{[process][name]}" }
        }
      }
    }

    # ---------- CLEANUP ----------
    mutate {
      remove_field => [ "raw", "processes" ]
    }
  }
}

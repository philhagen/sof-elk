#
# This file parses NirSoft BrowsingHistoryView output:
#   https://www.nirsoft.net/utils/browsing_history_view.html
#
# BrowsingHistoryView reads on-disk browser history stores (Chrome, Firefox,
# Internet Explorer / Edge legacy, Safari) directly and emits a unified
# 14-column CSV across all browsers. This complements the Hindsight parser
# (6508), which only covers Chromium-based browsers but extracts richer
# Chromium-specific detail (download danger-type, all_http_headers, etc.).
# Together they give an investigator browser coverage across the Windows
# ecosystem.
#
# Both parsers ship into the same `browser-*` index. Use the cross-tool
# fields [browser][source_tool] and [browser][family] to slice the data:
#   - [browser][source_tool] = "nirsoft_browsinghistoryview" | "hindsight"
#   - [browser][family]      = "chrome" | "firefox" | "edge" | "ie" |
#                              "ie_edge" | "safari" | "opera" | "brave" |
#                              "vivaldi" | "other"
#
# NirSoft CSV schema (14 columns, post-lowercase normalization via csv2json):
#   url, title, visit_time, visit_count, visited_from, visit_type,
#   visit_duration, web_browser, user_profile, browser_profile,
#   url_length, typed_count, history_file, record_id

filter {
  if [labels][type] == "browser_nirsoft" {

    # ---------- INPUT NORMALIZATION ----------
    # csv2json.py lowercases column names and converts spaces to underscores.
    # NirSoft CSV is cp1252-encoded; csv2json's errors="replace" safety net
    # converts unmappable bytes to U+FFFD (very rare in URL-dominated data).

    # ---------- FIELD RENAMES ----------
    mutate {
      rename => {
        "[raw][url]"             => "[browser][url]"
        "[raw][title]"           => "[browser][title]"
        "[raw][visit_time]"      => "[browser][visit][time]"
        "[raw][visit_count]"     => "[browser][visit][count]"
        "[raw][visited_from]"    => "[browser][visit][from_url]"
        "[raw][visit_type]"      => "[browser][visit][type]"
        "[raw][visit_duration]"  => "[browser][visit][duration]"
        "[raw][web_browser]"     => "[browser][raw_name]"
        "[raw][user_profile]"    => "[user][name]"
        "[raw][browser_profile]" => "[browser][profile]"
        "[raw][url_length]"      => "[browser][url_length]"
        "[raw][typed_count]"     => "[browser][visit][typed_count]"
        "[raw][history_file]"    => "[browser][history_file]"
        "[raw][record_id]"       => "[browser][record_id]"
      }
      add_field => {
        "[browser][source_tool]" => "nirsoft_browsinghistoryview"
      }
    }

    # ---------- TYPE COERCION ----------
    mutate {
      convert => {
        "[browser][visit][count]"        => "integer"
        "[browser][visit][duration]"     => "integer"
        "[browser][visit][typed_count]"  => "integer"
        "[browser][url_length]"          => "integer"
      }
    }

    # ---------- TIMESTAMP ----------
    # NirSoft Visit Time format: M/d/yyyy h:mm:ss a (locale-en, 12-hour, AM/PM).
    # Examples: "12/2/2019 8:21:45 PM", "2/3/2020 3:54:40 AM".
    # NirSoft emits times in the *system local timezone* at collection time —
    # without out-of-band metadata about that timezone, we trust the string
    # at face value (same convention used by every other KAPE parser here).
    if [browser][visit][time] and [browser][visit][time] != "" {
      date {
        match => [ "[browser][visit][time]",
                   "M/d/yyyy h:mm:ss a",
                   "M/d/yyyy H:mm:ss",
                   "ISO8601" ]
      }
      date {
        match => [ "[browser][visit][time]",
                   "M/d/yyyy h:mm:ss a",
                   "M/d/yyyy H:mm:ss",
                   "ISO8601" ]
        target => "[browser][visit][time]"
      }
    }

    # ---------- BROWSER FAMILY NORMALIZATION ----------
    # NirSoft's Web Browser column carries display names like
    # "Internet Explorer 10/11 / Edge" — fold those into normalized families
    # so the Browser Distribution donut can group across both parsers.
    ruby {
      code => '
        raw = (event.get("[browser][raw_name]") || "").to_s.downcase
        fam = "other"
        if raw.include?("brave")
          fam = "brave"
        elsif raw.include?("vivaldi")
          fam = "vivaldi"
        elsif raw.include?("opera")
          fam = "opera"
        elsif raw.include?("chrome")
          fam = "chrome"
        elsif raw.include?("firefox") || raw.include?("mozilla")
          fam = "firefox"
        elsif raw.include?("internet explorer") && raw.include?("edge")
          # NirSoft lumps legacy IE 10/11 and pre-Chromium Edge into one bucket
          fam = "ie_edge"
        elsif raw.include?("edge")
          fam = "edge"
        elsif raw.include?("internet explorer")
          fam = "ie"
        elsif raw.include?("safari")
          fam = "safari"
        end
        event.set("[browser][family]", fam)
      '
    }

    # ---------- URL SCHEME + DOMAIN ----------
    # Split scheme off the URL for fast filtering on file:// (local file
    # access via the browser, a quiet but high-value insider-threat signal)
    # and ms-appx-web:// (Edge legacy app frames). For http/https URLs,
    # extract the bare domain so the dashboard can aggregate by site.
    if [browser][url] {
      ruby {
        code => '
          url = (event.get("[browser][url]") || "").to_s
          m = url.match(/\A([a-zA-Z][a-zA-Z0-9+\-.]*?):(.*)\z/)
          if m
            scheme = m[1].downcase
            rest = m[2]
            event.set("[url][scheme]", scheme)
            if (scheme == "http" || scheme == "https") && rest.start_with?("//")
              dm = rest[2..].match(/\A([^\/\?\#:]+)/)
              event.set("[url][domain]", dm[1].downcase) if dm
            end
          end
        '
      }
    }

    # ---------- INSIDER-THREAT TAGGING ----------
    # Tag categories meaningful to an IR/insider-threat investigator. Same
    # canonical tags as the Hindsight parser so dashboards can mix sources.
    ruby {
      code => '
        url    = (event.get("[browser][url]") || "").to_s.downcase
        scheme = (event.get("[url][scheme]") || "").to_s.downcase
        vtype  = (event.get("[browser][visit][type]") || "").to_s
        tcount = (event.get("[browser][visit][typed_count]") || 0).to_i

        existing = event.get("tags") || []
        existing = [existing] unless existing.is_a?(Array)
        new_tags = []

        # file:// = direct local file access via the browser (often
        # documents the user opened in-browser instead of via Explorer)
        new_tags << "browser_local_file_access" if scheme == "file"

        # NirSoft semantics: visit_type "Typed URL" is the high-intent signal;
        # typed_count > 0 (from the URL store) is the same signal viewed from
        # a different angle. Either one means the user typed (not clicked).
        new_tags << "browser_typed_url" if vtype == "Typed URL" || tcount > 0

        # Form Submit = posted data (creds, search queries, file uploads)
        new_tags << "browser_form_submit" if vtype == "Form Submit"

        # Downloads
        new_tags << "browser_download" if vtype == "Download"

        # Category lists are kept aligned with 6508-browser_hindsight.conf
        sharing       = %w[ dropbox.com box.com mega.nz mega.io mediafire.com
                            wetransfer.com we.tl sendspace.com transfer.sh
                            anonfiles.com gofile.io filebin.net ufile.io
                            easyupload.io filetransfer.io ]
        cloud_personal = %w[ drive.google.com onedrive.live.com 1drv.ms
                             icloud.com proton.me protonmail.com tutanota.com ]
        webmail        = %w[ mail.google.com outlook.live.com outlook.office.com
                             mail.yahoo.com mail.proton.me protonmail.com ]
        ai_assist      = %w[ chat.openai.com chatgpt.com claude.ai
                             gemini.google.com bard.google.com poe.com
                             perplexity.ai copilot.microsoft.com ]
        job_sites      = %w[ linkedin.com/jobs indeed.com glassdoor.com
                             monster.com ziprecruiter.com dice.com
                             careerbuilder.com simplyhired.com ]
        canary         = %w[ canarytokens.com canarytokens.org ]

        sharing.each       { |d| new_tags << "browser_file_sharing"   if url.include?(d) }
        cloud_personal.each{ |d| new_tags << "browser_cloud_personal" if url.include?(d) }
        webmail.each       { |d| new_tags << "browser_webmail"        if url.include?(d) }
        ai_assist.each     { |d| new_tags << "browser_ai_assistant"   if url.include?(d) }
        job_sites.each     { |d| new_tags << "browser_job_site"       if url.include?(d) }
        canary.each        { |d| new_tags << "browser_canary_token"   if url.include?(d) }

        event.set("tags", (existing + new_tags).uniq) if new_tags.length > 0
      '
    }

    # ---------- MESSAGE FIELD ----------
    if [browser][title] and [browser][title] != "" {
      mutate {
        replace => { "message" => "%{[browser][raw_name]} [%{[user][name]}]: %{[browser][title]} (%{[browser][url]})" }
      }
    } else {
      mutate {
        replace => { "message" => "%{[browser][raw_name]} [%{[user][name]}]: %{[browser][url]}" }
      }
    }

    # ---------- CLEANUP ----------
    mutate {
      remove_field => [ "raw" ]
    }
  }
}

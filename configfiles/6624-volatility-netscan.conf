# Logstash configuration for Volatility windows.netscan output

filter {
  # Only process if this is a netscan document
  if [labels][type] == "volatility-netscan" and "volatility-netscan" in [tags] {  
    # Mark for correlation with netstat
    mutate {
      add_tag => [ "correlate_with_netstat" ]
    }

  }
}

# This file contains transforms and enrichments to be applied in postprocessing

filter {

  mutate {
    copy => {
      "[winlog][process][parent][pid]" => "[process][parent][pid]"
      "[winlog][process][pid]" => "[process][pid]"
    }

    convert => {
      "[process][client][pid]" => "integer"
      "[process][parent][pid]" => "integer"
      "[process][pid]" => "integer"
      "[process][source][pid]" => "integer"
    }
  }

  if [process][client][pid] {
    mutate { merge => { "[related][pid]" => "[process][client][pid]" } }
  }
  if [process][parent][pid] {
    mutate { merge => { "[related][pid]" => "[process][parent][pid]" } }
  }
  if [process][pid] {
    mutate { merge => { "[related][pid]" => "[process][pid]" } }
  }
  if [process][source][pid] {
    mutate { merge => { "[related][pid]" => "[process][source][pid]" } }
  }

  # de-duplicate the [related][pid] array
  ruby {
    code => "
      a = event.get('[related][pid]')
      if a.is_a? Array
        event.remove('[related][pid]')
        event.set('related.pid', a.uniq)
      end"
  }
}

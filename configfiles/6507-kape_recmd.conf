# (C)2026 Lewes Technology Consulting, LLC
#
# This file parses Windows Registry batch output emitted by RECmd
# (Eric Zimmerman) via the KAPE forensic tool. The typical batch file is
# Kroll_Batch.reb or DFIRBatch.reb — both produce the same 15-column CSV
# schema described below; the Category field is the discriminator between
# very different forensic findings folded into one stream.
#
# RECmd batch output schema (15 columns):
#   HivePath, HiveType, Description, Category, KeyPath, ValueName,
#   ValueType, ValueData, ValueData2, ValueData3, Comment, Recursive,
#   Deleted, LastWriteTimestamp, PluginDetailFile
#
# The Category field carries the curated DFIR meaning (e.g., "Program
# Execution" rolls in AppCompatCache + Amcache + BAM + UserAssist + MUICache
# all in one). This parser sets @timestamp from LastWriteTimestamp and
# emits an insider-threat-flavored tag per registry finding.

filter {
  if [labels][type] == "kape_registry" {

    # ---------- INPUT NORMALIZATION ----------
    # csv2json.py lowercases field names → we normalize back to PascalCase
    # so the main rename block handles one form only.
    if ![raw][HivePath] and [raw][hivepath] {
      mutate {
        rename => {
          "[raw][hivepath]"          => "[raw][HivePath]"
          "[raw][hivetype]"          => "[raw][HiveType]"
          "[raw][description]"       => "[raw][Description]"
          "[raw][category]"          => "[raw][Category]"
          "[raw][keypath]"           => "[raw][KeyPath]"
          "[raw][valuename]"         => "[raw][ValueName]"
          "[raw][valuetype]"         => "[raw][ValueType]"
          "[raw][valuedata]"         => "[raw][ValueData]"
          "[raw][valuedata2]"        => "[raw][ValueData2]"
          "[raw][valuedata3]"        => "[raw][ValueData3]"
          "[raw][comment]"           => "[raw][Comment]"
          "[raw][recursive]"         => "[raw][Recursive]"
          "[raw][deleted]"           => "[raw][Deleted]"
          "[raw][lastwritetimestamp]" => "[raw][LastWriteTimestamp]"
          "[raw][plugindetailfile]"  => "[raw][PluginDetailFile]"
        }
      }
    }

    # ---------- FIELD RENAMES ----------
    mutate {
      rename => {
        "[raw][HivePath]"            => "[registry][hive_path]"
        "[raw][HiveType]"            => "[registry][hive_type]"
        "[raw][Description]"         => "[registry][description]"
        "[raw][Category]"            => "[registry][category]"
        "[raw][KeyPath]"             => "[registry][key_path]"
        "[raw][ValueName]"           => "[registry][value_name]"
        "[raw][ValueType]"           => "[registry][value_type]"
        "[raw][ValueData]"           => "[registry][value_data]"
        "[raw][ValueData2]"          => "[registry][value_data2]"
        "[raw][ValueData3]"          => "[registry][value_data3]"
        "[raw][Comment]"             => "[registry][comment]"
        "[raw][Recursive]"           => "[registry][recursive]"
        "[raw][Deleted]"             => "[registry][deleted]"
        "[raw][LastWriteTimestamp]"  => "[registry][last_write]"
        "[raw][PluginDetailFile]"    => "[registry][plugin_detail_file]"
      }
    }

    # ---------- TYPE NORMALIZATION ----------
    mutate {
      convert => {
        "[registry][recursive]" => "boolean"
        "[registry][deleted]"   => "boolean"
      }
    }

    # ---------- TIMESTAMP NORMALIZATION ----------
    # RECmd LastWriteTimestamp format: yyyy-MM-dd HH:mm:ss.SSSSSSS
    # (Windows FILETIME → 7-digit fractional second precision).
    if [registry][last_write] and [registry][last_write] != "" {
      date {
        match => [ "[registry][last_write]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
      }
      date {
        match => [ "[registry][last_write]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[registry][last_write]"
      }
    }

    # ---------- INSIDER-THREAT TAGGING ----------
    # Drive the tagging off the Category field (set by the batch file) plus
    # patterns in Description / KeyPath. The 14 categories that DFIRBatch
    # emits are:
    #   Event Logs, Installed Software, Program Execution, Services,
    #   System Info, User Activity, Autoruns, Web Browsers, User Accounts,
    #   Volume Shadow Copies, Threat Hunting, Devices, Network Shares,
    #   Cloud Storage
    # Each gets normalized into a `registry_*` tag for clean dashboard
    # filters. Plus we add highest-value sub-tags for what to look at first.
    ruby {
      code => '
        category = (event.get("[registry][category]") || "").to_s
        desc     = (event.get("[registry][description]") || "").to_s
        keypath  = (event.get("[registry][key_path]") || "").to_s
        valname  = (event.get("[registry][value_name]") || "").to_s
        valdata  = (event.get("[registry][value_data]") || "").to_s

        existing = event.get("tags") || []
        existing = [existing] unless existing.is_a?(Array)
        new_tags = []

        # Category → flat tag
        if category.length > 0
          slug = category.downcase.gsub(/[^a-z0-9]+/, "_").gsub(/^_|_$/, "")
          new_tags << "registry_#{slug}"
        end

        # ---------- High-value sub-tags ----------

        # USB / removable media history
        kpu = keypath.upcase
        descu = desc.upcase
        if kpu.include?("USBSTOR") || kpu.include?("USB\\VID_") ||
           kpu.include?("MOUNTEDDEVICES") || kpu.include?("PORTABLE DEVICES") ||
           descu.include?("USB DEVICE") || descu.include?("MOUNTED")
          new_tags << "registry_usb_or_mounted_device"
        end

        # Typed / MRU user input (strong intent signal)
        if descu.include?("RUNMRU") || descu.include?("TYPEDPATH") ||
           descu.include?("TYPEDURL") || descu.include?("WORDWHEELQUERY") ||
           descu.include?("RECENTDOCS") || descu.include?("RECENT FILES") ||
           descu.include?("OFFICE MRU") || descu.include?("OPENSAVEPIDL") ||
           kpu.include?("RUNMRU") || kpu.include?("TYPEDPATHS") ||
           kpu.include?("TYPEDURLS") || kpu.include?("WORDWHEELQUERY") ||
           kpu.include?("RECENTDOCS")
          new_tags << "registry_typed_or_mru_input"
        end

        # Cloud storage sync (OneDrive, Dropbox, Google Drive, Box, iCloud)
        if descu.include?("ONEDRIVE") || descu.include?("DROPBOX") ||
           descu.include?("GOOGLE DRIVE") || descu.include?("ICLOUD") ||
           descu.include?("BOX SYNC") || category == "Cloud Storage" ||
           kpu.include?("ONEDRIVE") || kpu.include?("DROPBOX")
          new_tags << "registry_cloud_storage"
        end

        # Network shares / mapped drives / VPN profiles
        if descu.include?("NETWORK SHARE") || descu.include?("MAPPED DRIVE") ||
           descu.include?("MAP NETWORK") || descu.include?("MOUNTPOINTS2") ||
           descu.include?("VPN") || descu.include?("WIFI") ||
           descu.include?("PROFILELIST") ||
           kpu.include?("MOUNTPOINTS2") || kpu.include?("NETWORKLIST")
          new_tags << "registry_network_or_share"
        end

        # Program execution evidence (BAM, AppCompatCache, Amcache, UserAssist, MUICache)
        if descu.include?("BAM") || descu.include?("APPCOMPATCACHE") ||
           descu.include?("SHIMCACHE") || descu.include?("AMCACHE") ||
           descu.include?("USERASSIST") || descu.include?("MUICACHE") ||
           descu.include?("PCA") || descu.include?("FEATUREUSAGE") ||
           category == "Program Execution"
          new_tags << "registry_program_execution"
        end

        # Persistence / autoruns
        if descu.include?("RUN KEY") || descu.include?("RUNONCE") ||
           descu.include?("SCHEDULED TASK") || descu.include?("SERVICE") ||
           descu.include?("STARTUP") || descu.include?("APPINIT") ||
           descu.include?("IMAGE FILE EXECUTION OPTION") ||
           category == "Autoruns"
          new_tags << "registry_autorun_or_persistence"
        end

        # Things in the curated "Threat Hunting" category
        new_tags << "registry_threat_hunting" if category == "Threat Hunting"

        # Deleted registry entries (recovered from slack space, often interesting)
        new_tags << "registry_deleted_recovered" if event.get("[registry][deleted]") == true

        event.set("tags", existing + new_tags) if new_tags.length > 0
      '
    }

    # ---------- HOSTNAME EXTRACTION ----------
    # KAPE RECmd output filename pattern:
    #   <YYYYMMDDHHMMSS>_RECmd_Batch_<BatchName>_Output.csv|json
    # If filebeat path encodes the host, pull it via grok. Otherwise rely on
    # the agent hostname or filename-only heuristics.
    if [log][file][path] {
      grok {
        match => { "[log][file][path]" => [
          "(?:.*/)?%{NUMBER}_RECmd_Batch_(?<[registry][batch_name]>[^_]+)_Output\.(?:csv|json)$"
        ] }
        tag_on_failure => [ "_grokparsefail_6507-01" ]
      }
    }

    # ---------- HOST METADATA ENRICHMENT ----------
    # Pull OS name/build/edition + ComputerName + server role (ProductType)
    # out of well-known registry locations so the Evidence Inventory dashboard
    # can aggregate "what kind of host is this" without re-parsing in Kibana.
    #
    # Uses 92.chr (literal backslash) to dodge Logstash/Ruby escape ambiguity
    # in registry key paths — same pattern the shellbags parser uses.
    ruby {
      code => '
        keypath = (event.get("[registry][key_path]") || "").to_s
        valname = (event.get("[registry][value_name]") || "").to_s
        valdata = (event.get("[registry][value_data]") || "").to_s
        kpu = keypath.upcase
        vnu = valname.upcase
        bs  = 92.chr

        # SOFTWARE\Microsoft\Windows NT\CurrentVersion\* → OS facts
        cv_marker = "MICROSOFT" + bs + "WINDOWS NT" + bs + "CURRENTVERSION"
        if kpu.include?(cv_marker)
          case vnu
          when "PRODUCTNAME"
            event.set("[host][os][name]", valdata) unless valdata.empty?
          when "CURRENTBUILD", "CURRENTBUILDNUMBER"
            event.set("[host][os][build]", valdata) unless valdata.empty?
          when "EDITIONID"
            event.set("[host][os][edition]", valdata) unless valdata.empty?
          when "INSTALLATIONTYPE"
            event.set("[host][os][installation_type]", valdata) unless valdata.empty?
          end
        end

        # SYSTEM\...\Control\ProductOptions\ProductType → server role
        # LanmanNT=DC, ServerNT=Member Server, WinNT=Workstation/Endpoint
        po_marker = "CONTROL" + bs + "PRODUCTOPTIONS"
        if kpu.include?(po_marker) && vnu == "PRODUCTTYPE"
          case valdata
          when "LanmanNT"
            event.set("[host][role]", "domain_controller")
          when "ServerNT"
            event.set("[host][role]", "member_server")
          when "WinNT"
            event.set("[host][role]", "endpoint")
          end
        end

        # SYSTEM\...\Control\ComputerName\(Active)ComputerName → hostname
        cn_marker = "CONTROL" + bs + "COMPUTERNAME"
        if kpu.include?(cn_marker) && vnu == "COMPUTERNAME"
          event.set("[host][hostname]", valdata) unless valdata.empty?
        end
      '
    }

    # ---------- MESSAGE FIELD ----------
    if [registry][description] {
      mutate {
        replace => { "message" => "Registry [%{[registry][category]}] %{[registry][description]}" }
      }
    }

    # ---------- CLEANUP ----------
    mutate {
      remove_field => [ "raw" ]
    }
  }
}

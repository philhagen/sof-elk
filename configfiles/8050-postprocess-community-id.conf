#
# This file adds a Community ID field for records with all of the necessary components
# Original script from RockNSM was used as a basis for this functionality

filter {
  # look up the text protocol for a numerical equivalent
  if [network][transport] and ![network][iana_number] {
    translate {
      dictionary_path => "/usr/local/sof-elk/lib/dictionaries/ip_proto_name2int.yaml"
      source => "[network][transport]"
      target => "[network][iana_number]"
    }

  # look up the numerical protocol number for a text equivalent
  } else if [network][iana_number] and ![network][transport] {
    translate {
      dictionary_path => "/usr/local/sof-elk/lib/dictionaries/ip_proto_int2name.yaml"
      source => "[network][iana_number]"
      target => "[network][transport]"
    }
  }

  if ![network][community_id] {
    if ([source][ip] and [destination][ip] and [network][iana_number] and [source][port] and [destination][port]) {
      mutate {
        copy => {
          "[source][ip]" => "[@metadata][source_ip]"
          "[destination][ip]" => "[@metadata][destination_ip]"
          "[source][port]" => "[@metadata][source_port]"
          "[destination][port]" => "[@metadata][destination_port]"
        }
      }
    } else if ([local][ip] and [remote][ip] and [network][iana_number] and [local][port] and [remote][port]) {
      mutate {
        copy => {
          "[local][ip]" => "[@metadata][source_ip]"
          "[remote][ip]" => "[@metadata][destination_ip]"
          "[local][port]" => "[@metadata][source_port]"
          "[remote][port]" => "[@metadata][destination_port]"
        }
      }
    }

    if [@metadata][source_ip] and [@metadata][destination_ip] and [network][iana_number] and [@metadata][source_port] and [@metadata][destination_port] {
      ruby {
        path => "/usr/local/sof-elk/supporting-scripts/community-id.rb"
        script_params => {
          "source_ip_field" => "[@metadata][source_ip]"
          "dest_ip_field" => "[@metadata][destination_ip]"
          "source_port_field" => "[@metadata][source_port]"
          "dest_port_field" => "[@metadata][destination_port]"

          "target_field" => "[network][community_id]"
        }
        tag_on_exception => "_rubyexception-community-id"
      }
    }
  }
}

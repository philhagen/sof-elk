#
# This file parses Jump List output from JLECmd (Eric Zimmerman) via the
# KAPE forensic tool. Both jump list variants flow through here:
#
#   AutomaticDestinations  (44 columns)  — *.automaticDestinations-ms
#       Windows itself maintains these. Records "recent files" per AppId
#       (= per application) into a DestList stream, including network
#       paths, removable-drive references, distributed link-tracker UUIDs,
#       Pinned vs Recent state, and MRU position.
#
#   CustomDestinations     (28 columns)  — *.customDestinations-ms
#       Apps create these themselves (Chrome "Most visited", Outlook
#       "Recent", Firefox "Recent Sessions", PuTTY pinned sessions, etc.).
#       No DestList — but every row carries the AppIdDescription, the
#       target file path, and (for Chrome at least) Arguments that show
#       what jumplist action the entry triggers.
#
# Together, jump lists answer "what files did the user open in which apps,
# from where, and were any of those files on removable media or network
# shares?" — extremely high-value for insider-threat triage.
#
# Both CSV variants share enough columns that one parser handles both.
# Variant-specific fields (PinStatus, MRU, EntryName, etc.) are renamed
# only if present and tagged so dashboards can split if needed.
#
# Field-naming convention mirrors LECmd (6503): file.target.* for the
# *referenced* file, file.tracker.* for the distributed link-tracker
# metadata (machine_id / mac / creation), file.path for the .ms source
# file itself.

filter {
  if [labels][type] == "kape_jumplists" {

    # ---------- INPUT NORMALIZATION ----------
    # csv2json.py lowercases column names. Normalize back to PascalCase
    # so the main rename block handles one form only.
    if ![raw][SourceFile] and [raw][sourcefile] {
      mutate {
        rename => {
          "[raw][sourcefile]"             => "[raw][SourceFile]"
          "[raw][sourcecreated]"          => "[raw][SourceCreated]"
          "[raw][sourcemodified]"         => "[raw][SourceModified]"
          "[raw][sourceaccessed]"         => "[raw][SourceAccessed]"
          "[raw][appid]"                  => "[raw][AppId]"
          "[raw][appiddescription]"       => "[raw][AppIdDescription]"
          "[raw][entryname]"              => "[raw][EntryName]"
          "[raw][hassps]"                 => "[raw][HasSps]"
          "[raw][destlistversion]"        => "[raw][DestListVersion]"
          "[raw][lastusedentrynumber]"    => "[raw][LastUsedEntryNumber]"
          "[raw][mru]"                    => "[raw][MRU]"
          "[raw][entrynumber]"            => "[raw][EntryNumber]"
          "[raw][creationtime]"           => "[raw][CreationTime]"
          "[raw][lastmodified]"           => "[raw][LastModified]"
          "[raw][hostname]"               => "[raw][Hostname]"
          "[raw][macaddress]"             => "[raw][MacAddress]"
          "[raw][path]"                   => "[raw][Path]"
          "[raw][interactioncount]"       => "[raw][InteractionCount]"
          "[raw][pinstatus]"              => "[raw][PinStatus]"
          "[raw][filebirthdroid]"         => "[raw][FileBirthDroid]"
          "[raw][filedroid]"              => "[raw][FileDroid]"
          "[raw][volumebirthdroid]"       => "[raw][VolumeBirthDroid]"
          "[raw][volumedroid]"            => "[raw][VolumeDroid]"
          "[raw][targetcreated]"          => "[raw][TargetCreated]"
          "[raw][targetmodified]"         => "[raw][TargetModified]"
          "[raw][targetaccessed]"         => "[raw][TargetAccessed]"
          "[raw][filesize]"               => "[raw][FileSize]"
          "[raw][relativepath]"           => "[raw][RelativePath]"
          "[raw][workingdirectory]"       => "[raw][WorkingDirectory]"
          "[raw][fileattributes]"         => "[raw][FileAttributes]"
          "[raw][headerflags]"            => "[raw][HeaderFlags]"
          "[raw][drivetype]"              => "[raw][DriveType]"
          "[raw][volumeserialnumber]"     => "[raw][VolumeSerialNumber]"
          "[raw][volumelabel]"            => "[raw][VolumeLabel]"
          "[raw][localpath]"              => "[raw][LocalPath]"
          "[raw][commonpath]"             => "[raw][CommonPath]"
          "[raw][targetidabsolutepath]"   => "[raw][TargetIDAbsolutePath]"
          "[raw][targetmftentrynumber]"   => "[raw][TargetMFTEntryNumber]"
          "[raw][targetmftsequencenumber]"=> "[raw][TargetMFTSequenceNumber]"
          "[raw][machineid]"              => "[raw][MachineID]"
          "[raw][machinemacaddress]"      => "[raw][MachineMACAddress]"
          "[raw][trackercreatedon]"       => "[raw][TrackerCreatedOn]"
          "[raw][extrablockspresent]"     => "[raw][ExtraBlocksPresent]"
          "[raw][arguments]"              => "[raw][Arguments]"
          "[raw][notes]"                  => "[raw][Notes]"
        }
      }
    }

    # ---------- FIELD RENAMES (shared between AutoDest + CustomDest) ----------
    mutate {
      rename => {
        # The .ms source file itself
        "[raw][SourceFile]"                 => "[file][path]"
        "[raw][SourceCreated]"              => "[file][created]"
        "[raw][SourceModified]"             => "[file][mtime]"
        "[raw][SourceAccessed]"             => "[file][accessed]"

        # AppId — hashed identifier, plus the human-readable description
        "[raw][AppId]"                      => "[jumplist][app_id]"
        "[raw][AppIdDescription]"           => "[jumplist][app_description]"

        # Origin host (recorded inside the .ms file at the time it was created)
        "[raw][Hostname]"                   => "[host][hostname]"
        "[raw][MacAddress]"                 => "[host][mac]"

        # The referenced target (the file/folder this jump-list entry points at)
        "[raw][TargetCreated]"              => "[file][target][created]"
        "[raw][TargetModified]"             => "[file][target][mtime]"
        "[raw][TargetAccessed]"             => "[file][target][accessed]"
        "[raw][FileSize]"                   => "[file][size]"
        "[raw][LocalPath]"                  => "[file][target][local_path]"
        "[raw][CommonPath]"                 => "[file][target][common_path]"
        "[raw][RelativePath]"               => "[file][target][relative_path]"
        "[raw][WorkingDirectory]"           => "[file][target][working_directory]"
        "[raw][TargetIDAbsolutePath]"       => "[file][target][absolute_path]"
        "[raw][TargetMFTEntryNumber]"       => "[file][target][inode_string]"
        "[raw][TargetMFTSequenceNumber]"    => "[file][target][sequence_number_string]"
        "[raw][Arguments]"                  => "[file][target][path][arguments]"
        "[raw][DriveType]"                  => "[file][target][drivetype]"
        "[raw][VolumeSerialNumber]"         => "[volume][serial_number]"
        "[raw][VolumeLabel]"                => "[file][target][volume][label]"
        "[raw][HeaderFlags]"                => "[file][header_flags]"
        "[raw][FileAttributes]"             => "[file][attributes]"
        "[raw][ExtraBlocksPresent]"         => "[file][extra_blocks]"

        # Distributed Link Tracker — origin machine where the file lived
        # (often != current Hostname when a file came from another machine)
        "[raw][MachineID]"                  => "[file][tracker][machine_id]"
        "[raw][MachineMACAddress]"          => "[file][tracker][mac]"
        "[raw][TrackerCreatedOn]"           => "[file][tracker][creation]"
        "[raw][FileBirthDroid]"             => "[file][tracker][file_birth_droid]"
        "[raw][FileDroid]"                  => "[file][tracker][file_droid]"
        "[raw][VolumeBirthDroid]"           => "[file][tracker][volume_birth_droid]"
        "[raw][VolumeDroid]"                => "[file][tracker][volume_droid]"

        # Path is the friendly path (Auto only — Custom has it via Local/CommonPath).
        # Keep it on a [jumplist][...] subpath because it overlaps with the
        # KnownFolder syntax ("knownfolder:{GUID} ==> ThisPCDesktopFolder")
        # that doesn't fit cleanly under file.target.path semantics.
        "[raw][Path]"                       => "[jumplist][path]"
      }
    }

    # ---------- VARIANT-SPECIFIC FIELDS ----------
    # AutoDest-only fields. PinStatus, MRU, InteractionCount, DestList nav
    if [raw][HasSps] {
      mutate {
        rename => {
          "[raw][HasSps]"                   => "[jumplist][has_sps]"
          "[raw][DestListVersion]"          => "[jumplist][destlist][version]"
          "[raw][LastUsedEntryNumber]"      => "[jumplist][destlist][last_used_entry]"
          "[raw][MRU]"                      => "[jumplist][destlist][mru_position]"
          "[raw][EntryNumber]"              => "[jumplist][destlist][entry_number]"
          "[raw][CreationTime]"             => "[jumplist][destlist][creation]"
          "[raw][LastModified]"             => "[jumplist][destlist][mtime]"
          "[raw][PinStatus]"                => "[jumplist][pinned]"
          "[raw][InteractionCount]"         => "[jumplist][interaction_count]"
          "[raw][Notes]"                    => "[jumplist][notes]"
        }
        add_field => { "[jumplist][variant]" => "automatic" }
        add_tag   => [ "jumplist_automatic" ]
      }
      mutate {
        convert => {
          "[jumplist][destlist][mru_position]"   => "integer"
          "[jumplist][destlist][entry_number]"   => "integer"
          "[jumplist][interaction_count]"        => "integer"
          "[jumplist][pinned]"                   => "boolean"
        }
      }
    } else if [raw][EntryName] {
      mutate {
        rename => {
          "[raw][EntryName]"                => "[jumplist][entry_name]"
        }
        add_field => { "[jumplist][variant]" => "custom" }
        add_tag   => [ "jumplist_custom" ]
      }
    }

    if [file][size] {
      mutate {
        convert => { "[file][size]" => "integer" }
      }
    }

    # ---------- TIMESTAMP CONVERSIONS ----------
    # Same 3-format pattern used everywhere else in this branch:
    #   yyyy-MM-dd HH:mm:ss.SSSSSSS  (csv2json'd EZ Tools output)
    #   yyyy-MM-dd HH:mm:ss          (coarse seconds)
    #   ISO8601                      (native EZ Tools --json output)

    # Claim @timestamp from the most "user opened this" signal available.
    # AutoDest:  DestList CreationTime — when the DestList entry was added
    #            (which is when the user opened the file)
    # CustomDest: TargetModified — best available proxy
    # Fallback to SourceModified (the .ms file's mtime)
    if [jumplist][destlist][creation] and [jumplist][destlist][creation] != "" {
      date {
        match => [ "[jumplist][destlist][creation]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
      }
    } else if [file][target][mtime] and [file][target][mtime] != "" {
      date {
        match => [ "[file][target][mtime]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
      }
    } else if [file][mtime] and [file][mtime] != "" {
      date {
        match => [ "[file][mtime]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
      }
    }

    # Convert each time field in place to a date type
    if [file][created] and [file][created] != "" {
      date {
        match => [ "[file][created]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[file][created]"
      }
    }
    if [file][mtime] and [file][mtime] != "" {
      date {
        match => [ "[file][mtime]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[file][mtime]"
      }
    }
    if [file][accessed] and [file][accessed] != "" {
      date {
        match => [ "[file][accessed]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[file][accessed]"
      }
    }
    if [file][target][created] and [file][target][created] != "" {
      date {
        match => [ "[file][target][created]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[file][target][created]"
      }
    }
    if [file][target][mtime] and [file][target][mtime] != "" {
      date {
        match => [ "[file][target][mtime]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[file][target][mtime]"
      }
    }
    if [file][target][accessed] and [file][target][accessed] != "" {
      date {
        match => [ "[file][target][accessed]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[file][target][accessed]"
      }
    }
    if [jumplist][destlist][creation] and [jumplist][destlist][creation] != "" {
      date {
        match => [ "[jumplist][destlist][creation]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[jumplist][destlist][creation]"
      }
    }
    if [jumplist][destlist][mtime] and [jumplist][destlist][mtime] != "" {
      date {
        match => [ "[jumplist][destlist][mtime]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[jumplist][destlist][mtime]"
      }
    }
    if [file][tracker][creation] and [file][tracker][creation] != "" {
      date {
        match => [ "[file][tracker][creation]",
                   "yyyy-MM-dd HH:mm:ss.SSSSSSS",
                   "yyyy-MM-dd HH:mm:ss",
                   "ISO8601" ]
        target => "[file][tracker][creation]"
      }
    }

    # ---------- INTEGER PROMOTION FOR MFT REFERENCES ----------
    if [file][target][inode_string] and [file][target][inode_string] != "" {
      ruby {
        code => "
          v = event.get('[file][target][inode_string]')
          event.set('[file][target][inode]', Integer(v)) rescue nil
        "
        remove_field => [ "[file][target][inode_string]" ]
      }
    }
    if [file][target][sequence_number_string] and [file][target][sequence_number_string] != "" {
      ruby {
        code => "
          v = event.get('[file][target][sequence_number_string]')
          event.set('[file][target][sequence_number]', Integer(v)) rescue nil
        "
        remove_field => [ "[file][target][sequence_number_string]" ]
      }
    }

    # ---------- LNK-STYLE FLAGS → ARRAYS ----------
    # Same data_flags_to_array helper LECmd (6503) uses for HeaderFlags and
    # FileAttributes. Normalize "HasTargetIdList, HasLinkInfo, IsUnicode"
    # into an array of lowercase tokens.
    if [file][header_flags] {
      mutate {
        gsub => [ "[file][header_flags]", " ", "" ]
        lowercase => [ "[file][header_flags]" ]
      }
      ruby {
        path => "/usr/local/sof-elk/supporting-scripts/data_flags_to_array.rb"
        script_params => {
          "source_field" => "[file][header_flags]"
          "source_type"  => "str"
        }
      }
    }
    if [file][attributes] {
      mutate {
        gsub => [
          "[file][attributes]", " ", "",
          "[file][attributes]", "FileAttribute", ""
        ]
        lowercase => [ "[file][attributes]" ]
        add_field => { "[@metadata][attribute_type]" => "str" }
      }
    }
    if [file][extra_blocks] {
      mutate {
        gsub => [
          "[file][extra_blocks]", " ", "",
          "[file][extra_blocks]", "Block", ""
        ]
        lowercase => [ "[file][extra_blocks]" ]
        split => { "[file][extra_blocks]" => "," }
      }
    }

    # ---------- PROMOTE A "BEST" file.target.path ----------
    if [file][target][local_path] and [file][target][local_path] != "" {
      mutate { copy => { "[file][target][local_path]" => "[file][target][path]" } }
    } else if [file][target][absolute_path] and [file][target][absolute_path] != "" {
      mutate { copy => { "[file][target][absolute_path]" => "[file][target][path]" } }
    }

    # Drop the noisy "(None)" drive type before tagging
    if [file][target][drivetype] == "(None)" {
      mutate { remove_field => [ "[file][target][drivetype]" ] }
    }

    # ---------- INSIDER-THREAT TAGGING ----------
    ruby {
      code => '
        path        = (event.get("[file][target][path]") || "").to_s
        app_desc    = (event.get("[jumplist][app_description]") || "").to_s
        drivetype   = (event.get("[file][target][drivetype]") || "").to_s
        machine_id  = (event.get("[file][tracker][machine_id]") || "").to_s
        host_name   = (event.get("[host][hostname]") || "").to_s
        pinned      = event.get("[jumplist][pinned]")

        existing = event.get("tags") || []
        existing = [existing] unless existing.is_a?(Array)
        new_tags = []

        bs = 92.chr  # literal backslash

        # ---- Drive-letter heuristics (same convention as shellbags / LNK) ----
        # Match the first path char that looks like a drive letter
        # whether path starts with "C:", "\\\\server\\share", or knownfolder
        if path =~ /\A([A-Za-z]):#{Regexp.escape(bs)}/
          dl = $1.upcase
          case dl
          when "C"
            new_tags << "jumplist_local_drive"
          when "D","E","F","G","H","I","J","K"
            new_tags << "jumplist_likely_removable_media"
          when "L","M","N","O","P","Q","R","S","T","U","V"
            new_tags << "jumplist_secondary_drive"
          when "W","X","Y","Z"
            new_tags << "jumplist_likely_mapped_network"
          end
        end

        # ---- UNC / network share access ----
        unc_marker = bs + bs   # "\\"
        if path.start_with?(unc_marker)
          new_tags << "jumplist_network_share"
        end

        # ---- DriveType-based confirmation (from EZ Tools) ----
        case drivetype
        when /Removable/i
          new_tags << "jumplist_removable_confirmed"
        when /Network|Remote/i
          new_tags << "jumplist_network_confirmed"
        when /CD-ROM|DVD|Optical/i
          new_tags << "jumplist_optical_media"
        end

        # ---- Distributed link tracker cross-machine signal ----
        # MachineID is recorded into the LNK when the file is first opened.
        # If the current Hostname differs from MachineID (case-insensitive),
        # the file traveled between machines.
        if machine_id.length > 0 && host_name.length > 0 &&
           machine_id.downcase != host_name.downcase
          new_tags << "jumplist_tracker_cross_machine"
        end

        # ---- Pinned-by-user signal ----
        if pinned == true
          new_tags << "jumplist_pinned"
        end

        # ---- App-class categorization ----
        ad = app_desc.downcase
        if ad.include?("word") || ad.include?("excel") || ad.include?("powerpoint") ||
           ad.include?("outlook") || ad.include?("onenote") || ad.include?("office")
          new_tags << "jumplist_office_app"
        end
        if ad.include?("chrome") || ad.include?("firefox") || ad.include?("edge") ||
           ad.include?("internet explorer") || ad.include?("opera") || ad.include?("brave") ||
           ad.include?("vivaldi") || ad.include?("safari")
          new_tags << "jumplist_browser_app"
        end
        if ad.include?("putty") || ad.include?("winscp") || ad.include?("mstsc") ||
           ad.include?("remote desktop") || ad.include?("teamviewer") ||
           ad.include?("anydesk") || ad.include?("vnc") || ad.include?("ssh")
          new_tags << "jumplist_remote_access_app"
        end
        if ad.include?("teams") || ad.include?("zoom") || ad.include?("slack") ||
           ad.include?("webex") || ad.include?("discord")
          new_tags << "jumplist_collab_app"
        end
        if ad.include?("explorer") || ad.include?("quick access")
          new_tags << "jumplist_file_explorer"
        end
        if ad.include?("control panel") || ad.include?("settings")
          new_tags << "jumplist_settings_panel"
        end

        # ---- Sensitive-extension flag for the target file ----
        ext = path.downcase.split(".").last.to_s
        if %w[ppk pem key pfx p12 cer crt id_rsa kdbx].include?(ext)
          new_tags << "jumplist_credential_or_key_file"
        end
        if %w[zip 7z rar tar gz bz2 xz iso cab].include?(ext)
          new_tags << "jumplist_archive_file"
        end
        if %w[ps1 vbs js bat cmd py rb sh].include?(ext)
          new_tags << "jumplist_script_file"
        end

        event.set("tags", (existing + new_tags).uniq) if new_tags.length > 0
      '
    }

    # ---------- MESSAGE FIELD ----------
    if [file][target][path] and [jumplist][app_description] {
      mutate {
        replace => { "message" => "Jump list (%{[jumplist][variant]}) [%{[jumplist][app_description]}]: %{[file][target][path]}" }
      }
    } else if [jumplist][app_description] {
      mutate {
        replace => { "message" => "Jump list (%{[jumplist][variant]}) [%{[jumplist][app_description]}]" }
      }
    }

    # ---------- CLEANUP ----------
    mutate {
      remove_field => [ "raw" ]
    }
  }
}

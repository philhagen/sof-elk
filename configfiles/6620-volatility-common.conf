# Logstash configuration for common Volatility records
# This parser (at least partially) handles JSON format from the following Volatility3 plugins:
# - windows.pslist
# - windows.pstree
# - windows.psscan

# - windows.netscan
# - windows.netstat

# NOTE: files should be created with e.g. the following commands:
# SYM=~/.symbols
# IMG=/path/to/DESKTOP-SDN1RPT.mem
# vol -q -s "$SYM" -r jsonl -f "$IMG" windows.pslist  > pslist.json
# vol -q -s "$SYM" -r jsonl -f "$IMG" windows.pstree  > pstree.json
# vol -q -s "$SYM" -r jsonl -f "$IMG" windows.psscan  > psscan.json
# vol -q -s "$SYM" -r jsonl -f "$IMG" windows.netscan > netscan.json
# vol -q -s "$SYM" -r jsonl -f "$IMG" windows.cmdline > cmdline.json
# vol -q -s "$SYM" -r jsonl -f "$IMG" windows.netstat > netstat.json

filter {
  # If this is a pstree event:
  # - calculate process depth
  # - split the event so __children[] can be walked
  if [labels][type] == "volatility" and "volatility-pstree" in [tags] {
    if ![@metadata][process_depth] {
      mutate {
        add_field => { "[@metadata][process_depth]" => 0 }
      }

    } else {
      ruby {
        code => "
          event.set('[@metadata][process_depth]', event_get('[@metadata][process_depth]').to_i + 1)
          event.set('[process][child_count]', event.get('[raw][__children]').length)
        "
      }
      mutate {
        replace => { "raw" => "%{child_processes}" }
      }
    }

    if [process][child_count] > 0 {
      split {
        field => "[raw][__children]"
        target => "child_processes"
      }
    }
  }

  # Only process if this is one of the listed record formats
  if [labels][type] == "volatility" and
    ( "volatility-pslist" in [tags] or "volatility-pstree" in [tags] or "volatility-psscan" in [tags] ) {
    # Extract process information
    mutate {
      rename => {
        "[raw][PID]" => "[process][pid]"
        "[raw][PPID]" => "[process][parent][pid]"
        "[raw][ImageFileName]" => "[process][name]"
        "[raw][Offset(V)]" => "[process][offset_v]"
        "[raw][Threads]" => "[process][thread][count]"
        "[raw][Handles]" => "[process][handle][count]"
        "[raw][SessionId]" => "[process][session_id]"
        "[raw][Wow64]" => "[process][wow64]"
        "[raw][File output]" => "[process][file_output]"
        "[raw][Audit]" => "[process][audit]"
        "[raw][Cmd]" => "[process][command_line]"
        "[raw][Path]" => "[process][executable]"
        "[@metadata][process_depth]" => "[process][depth]"
      }
    }

    # Parse timestamps
    if [raw][CreateTime] {
      date {
        match => [ "[raw][CreateTime]", "ISO8601" ]
        target => "@timestamp"
      }
      date {
        match => [ "[raw][CreateTime]", "ISO8601" ]
        target => "[process][start]"
      }
    }

    if [raw][ExitTime] and [raw][ExitTime] != "null" {
      date {
        match => [ "[raw][ExitTime]", "ISO8601" ]
        target => "[process][end]"
      }
      mutate {
        add_field => { "[process][status]" => "exited" }
      }
    } else {
      mutate {
        add_field => { "[process][status]" => "running" }
      }
    }

  } else if [labels][type] == "volatility" and
    ( "volatility-netscan" in [tags] or "volatility-netstat" in [tags] ) {
    # Extract network connection information
    mutate {
      rename => {
        "[raw][PID]" => "[process][pid]"
        "[raw][Owner]" => "[process][executable]"
        "[raw][LocalAddr]" => "[local][ip]"
        "[raw][LocalPort]" => "[local][port]"
        "[raw][ForeignAddr]" => "[remote][ip]"
        "[raw][ForeignPort]" => "[remote][port]"
        "[raw][Offset]" => "[process][offset_v]"
        "[raw][State]" => "[network][state]"
      }
    }

    # Parse connection creation timestamp
    if [raw][Created] {
      if [raw][Created] != "null" {
        date {
          match => [ "[raw][Created]", "ISO8601" ]
          target => "@timestamp"
        }
        date {
          match => [ "[raw][Created]", "ISO8601" ]
          target => "[event][start]"
        }
      } else if [raw][Created] == "null" {
        mutate {
          add_tag => [ "missing_timestamp"]
        }
      }
    }

    # Get IP version and transport (transport converted to integer in [iana][number] in postprocessing)
    if [raw][Proto] {
      grok {
        match => { "[raw][Proto]" => [
          "^%{DATA:[network][transport]}v%{INT:[@metadata][network_type]}$"
        ] }
        add_field => { "[network][type]" => "ipv%{[@metadata][network_type]}" }
      }
    }

  } else if [labels][type] == "volatility" and "volatility-cmdline" in [tags] {
    # Extract command line information
    mutate {
      rename => {
        "[raw][PID]" => "[process][pid]"
        "[raw][Args]" => "[process][command_line]"
        "[raw][Process]" => "[process][name]"
      }
    }
  }
}

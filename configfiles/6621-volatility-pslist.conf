# Logstash configuration for Volatility windows.pslist output
# This parser handles JSON format from Volatility3 windows.pslist plugin
#
# Index Pattern: volatility-pslist-*

filter {
  # Only process if this is a pslist document
  if [labels][type] == "volatility" and "volatility-pslist" in [tags] {
    # Extract process information
    mutate {
      rename => {
        "[raw][PID]" => "[process][pid]"
        "[raw][PPID]" => "[process][parent][pid]"
        "[raw][ImageFileName]" => "[process][executable]"
        "[raw][OffsetV]" => "[process][offset]"
        "[raw][Threads]" => "[process][thread][count]"
        "[raw][Handles]" => "[process][handle][count]"
        "[raw][SessionId]" => "[process][session_id]"
        "[raw][Wow64]" => "[process][wow64]"
        "[raw][File output]" => "[process][file_output]"
      }
      add_tag => [ "volatility", "memory_forensics", "process_list" ]
    }

    # Parse timestamps
    if [raw][CreateTime] {
      date {
        match => [ "[raw][CreateTime]", "ISO8601" ]
        target => "@timestamp"
      }
      date {
        match => [ "[raw][CreateTime]", "ISO8601" ]
        target => "[process][start]"
      }
    }

    if [raw][ExitTime] and [raw][ExitTime] != "null" {
      date {
        match => [ "[raw][ExitTime]", "ISO8601" ]
        target => "[process][end]"
      }
      mutate {
        add_field => { "[process][status]" => "exited" }
      }
    } else {
      mutate {
        add_field => { "[process][status]" => "running" }
      }
    }

    # Handle empty, null, or otherwise non-applicable fields
    if [process][session_id] == "N/A" or [process][session_id] == "null" {
      mutate {
        remove_field => [ "[process][session_id]" ]
      }
    }
    if [process][file_output] == "Disabled" {
      mutate {
        remove_field => [ "[process][file_output]" ]
      }
    }

    # Convert field types
    mutate {
      convert => {
        "[process][pid]" => "integer"
        "[process][parent][pid]" => "integer"
        "[process][thread][count]" => "integer"
        "[process][handle][count]" => "integer"
        "[process][wow64]" => "boolean"
        "[process][session_id]" => "integer"
      }
    }

    mutate {
      remove_field => "raw"
    }
  }
}

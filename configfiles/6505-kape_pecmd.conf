#
# This file contains filters, transforms, and enrichments for Prefetch logs parsed
# with the PECmd tool from the Eric Zimmerman/KAPE forensic toolset.

filter {
  if [labels][type] == "kape_prefetch" {
    mutate {
      # promote the fields of interest out of the [raw] placeholder
      # the [raw] placeholder is removed by 8005-postprocess-kape.conf
      rename => {
        "[raw][SourceFilename]" => "[file][path]"
        "[raw][SourceCreated]"  => "[file][stdinfo][ctime]"
        "[raw][SourceModified]" => "[file][stdinfo][mtime]"
        "[raw][SourceAccessed]" => "[file][stdinfo][accessed]"

        "[raw][ExecutableName]" => "[file][target][path]"
        "[raw][Hash]"           => "[kape][prefetch][hash]"
        "[raw][Size]"           => "[file][size]"
        "[raw][Version]"        => "[kape][prefetch][version]"
        "[raw][RunCount]"       => "[kape][prefetch][run_count]"
        "[raw][LastRun]"        => "[kape][prefetch][last_run]"

        "[raw][Volume0Name]"    => "[kape][prefetch][volume][name]"
        "[raw][Volume0Serial]"  => "[volume][serial_number]"
        "[raw][Volume0Created]" => "[kape][prefetch][volume][created]"

        "[raw][ParsingError]"   => "[kape][prefetch][parsing_error]"

        "[raw][Directories]" => "[kape][prefetch][directories]"
        "[raw][FilesLoaded]" => "[kape][prefetch][files_loaded]"

        # did not have a sample with this field
        #"[raw][SourceFile]"     => "[file][source_file]"
      }

      add_field => { "[file][extension]" => "pf" }
    }

    # Directories and FilesLoaded are comma-separated strings in PECmd output -
    # split into arrays for easier searching/aggregation.
    if [kape][prefetch][directories] {
      mutate {
        split  => { "[kape][prefetch][directories]" => ", " }
      }
    }
    if [kape][prefetch][files_loaded] {
      mutate {
        split  => { "[kape][prefetch][files_loaded]" => ", " }
      }
    }

    # PECmd emits timestamps in TWO possible formats depending on version/locale:
    #   - "yyyy-MM-dd HH:mm:ss"             (default for current PECmd builds)
    #   - "yyyy-MM-dd'T'HH:mm:ss.SSSSSSSZ"  (ISO8601, older builds or some options)
    # Each date{} below accepts both, plus the .NET DateTime.MinValue sentinels
    # that PECmd writes for unset values are stripped first so we don't index a
    # year-0001 timestamp.

    # clean up known potentially empty/sentinel fields before timestamp conversion
    if [kape][prefetch][last_run] in [ "", "0001-01-01 00:00:00", "0001-01-01T00:00:00.0000000+00:00" ] {
      mutate { remove_field => [ "[kape][prefetch][last_run]" ] }
    }
    if [kape][prefetch][volume][created] in [ "", "0001-01-01 00:00:00", "0001-01-01T00:00:00.0000000+00:00" ] {
      mutate { remove_field => [ "[kape][prefetch][volume][created]" ] }
    }

    # use the most recent execution time for @timestamp; fall back to source mtime
    if [kape][prefetch][last_run] {
      date {
        match => [ "[kape][prefetch][last_run]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      }
    } else if [file][stdinfo][mtime] {
      date {
        match => [ "[file][stdinfo][mtime]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      }
    }

    # convert all other timestamp fields to date/time types
    date {
      match  => [ "[kape][prefetch][last_run]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      target => "[kape][prefetch][last_run]"
    }
    date {
      match  => [ "[kape][prefetch][volume][created]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      target => "[kape][prefetch][volume][created]"
    }
    date {
      match  => [ "[file][stdinfo][ctime]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      target => "[file][stdinfo][ctime]"
    }
    date {
      match  => [ "[file][stdinfo][mtime]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      target => "[file][stdinfo][mtime]"
    }
    date {
      match  => [ "[file][stdinfo][accessed]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      target => "[file][stdinfo][accessed]"
    }
    # this is admittedly not pretty.  but logstash configs cannot loop, and
    # it doesn't seem feasible to perform an equivalent to the date {} filter
    # in a ruby block.
    if [raw][PreviousRun0] {
      date {
        match => [ "[raw][PreviousRun0]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
        target => "[raw][PreviousRun0]"
      }
      mutate {
        merge => { "[prefetch][previous_runs]" => "[raw][PreviousRun0]" }
      }
    }
    if [raw][PreviousRun1] {
      date {
        match => [ "[raw][PreviousRun1]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
        target => "[raw][PreviousRun1]"
      }
      mutate {
        merge => { "[prefetch][previous_runs]" => "[raw][PreviousRun1]" }
      }
    }
    if [raw][PreviousRun2] {
      date {
        match => [ "[raw][PreviousRun2]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
        target => "[raw][PreviousRun2]"
      }
      mutate {
        merge => { "[prefetch][previous_runs]" => "[raw][PreviousRun2]" }
      }
    }
    if [raw][PreviousRun3] {
      date {
        match => [ "[raw][PreviousRun3]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
        target => "[raw][PreviousRun3]"
      }
      mutate {
        merge => { "[prefetch][previous_runs]" => "[raw][PreviousRun3]" }
      }
    }
    if [raw][PreviousRun4] {
      date {
        match => [ "[raw][PreviousRun4]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
        target => "[raw][PreviousRun4]"
      }
      mutate {
        merge => { "[prefetch][previous_runs]" => "[raw][PreviousRun4]" }
      }
    }
    if [raw][PreviousRun5] {
      date {
        match => [ "[raw][PreviousRun5]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
        target => "[raw][PreviousRun5]"
      }
      mutate {
        merge => { "[prefetch][previous_runs]" => "[raw][PreviousRun5]" }
      }
    }
    if [raw][PreviousRun6] {
      date {
        match => [ "[raw][PreviousRun6]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
        target => "[raw][PreviousRun6]"
      }
      mutate {
        merge => { "[prefetch][previous_runs]" => "[raw][PreviousRun6]" }
      }
    }
    if [raw][PreviousRun7] {
      date {
        match => [ "[raw][PreviousRun7]", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
        target => "[raw][PreviousRun7]"
      }
      mutate {
        merge => { "[prefetch][previous_runs]" => "[raw][PreviousRun7]" }
      }
    }

    # PECmd's default JSON output emits Size and RunCount as quoted strings -
    # convert to integers so Kibana aggregations (sum, avg, range) work correctly
    mutate {
      convert => {
        "[file][size]" => "integer"
        "[kape][prefetch][run_count]" => "integer"
      }
    }

    # build a human-readable summary for the message field / Discover view
    if [file][target][path] and [kape][prefetch][run_count] {
      mutate {
        replace => { "message" => "Prefetch: %{[file][target][path]} executed %{[kape][prefetch][run_count]} time(s)" }
      }
    } else if [file][target][path] {
      mutate {
        replace => { "message" => "Prefetch: %{[file][target][path]}" }
      }
    } else {
      mutate {
        replace => { "message" => "Prefetch record (no executable name parsed)" }
      }
    }
  }
}
